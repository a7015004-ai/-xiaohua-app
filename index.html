<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小花食堂">
<meta name="theme-color" content="#F5EDE0">
<title>🌸 小花食堂 · 營運記帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

<!-- Firebase SDK v10 (compat mode) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
/* ─── CSS VARIABLES ─────────────────────────────────── */
:root {
  --bg:       #F5EDE0;
  --card:     #FDF8F2;
  --card2:    #F9F0E3;
  --border:   #E2C9A8;
  --accent:   #9E7248;
  --accent2:  #C49568;
  --text:     #3A2410;
  --muted:    #8B6040;
  --green:    #4F7942;
  --red:      #9B3A3A;
  --yellow:   #7A6518;
  --blue:     #3A5A8B;
  --shadow:   0 2px 14px rgba(100,65,30,.09);
  --radius:   14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:15px;height:100%}
body{font-family:'Noto Sans TC','PingFang TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ─── AUTH SCREEN ───────────────────────────────────── */
#auth-screen{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
}
.auth-box{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:36px 28px;width:min(88vw,380px);box-shadow:var(--shadow);
  text-align:center;
}
.auth-logo{font-size:48px;margin-bottom:8px}
.auth-title{font-size:22px;font-weight:900;color:var(--accent);margin-bottom:4px}
.auth-sub{font-size:12px;color:var(--muted);margin-bottom:28px}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:20px}
.auth-tab{
  flex:1;padding:8px;border:none;background:transparent;border-radius:7px;
  font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;
  transition:all .2s;
}
.auth-tab.active{background:var(--card);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.auth-field{text-align:left;margin-bottom:12px}
.auth-field label{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.08em;display:block;margin-bottom:4px}
.auth-field input{
  width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;
  padding:11px 13px;font-size:14px;color:var(--text);font-family:inherit;outline:none;
  transition:border-color .2s;
}
.auth-field input:focus{border-color:var(--accent2)}
.auth-btn{
  width:100%;padding:13px;background:var(--accent);color:var(--card);border:none;
  border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;
  margin-top:4px;transition:opacity .2s;
}
.auth-btn:active{opacity:.8}
.auth-err{font-size:12px;color:var(--red);margin-top:10px;min-height:16px}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-google{
  width:100%;padding:11px;background:var(--card);color:var(--text);
  border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:border-color .2s;
}
.auth-google:hover{border-color:var(--accent2)}

/* ─── LOADING ───────────────────────────────────────── */
#loading{
  position:fixed;inset:0;z-index:998;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── APP SHELL ─────────────────────────────────────── */
#app{display:none}

/* TOP BAR */
#topbar{
  position:sticky;top:0;z-index:100;
  background:var(--card);border-bottom:1px solid var(--border);
  padding:11px 16px;display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow);
}
#topbar h1{font-size:17px;font-weight:900;color:var(--accent);letter-spacing:-.02em}
#topbar .tbar-right{display:flex;align-items:center;gap:12px}
#topbar .tbar-date{font-size:10px;color:var(--muted)}
#topbar .tbar-rev{font-size:15px;font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums}
.sync-dot{
  width:7px;height:7px;border-radius:50%;background:var(--green);
  display:inline-block;margin-right:4px;transition:background .3s;
}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
.sync-dot.offline{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* NAV */
#nav{
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding:0 8px;
}
#nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex-shrink:0;border:none;background:transparent;
  padding:10px 13px;font-size:12px;font-weight:700;color:var(--muted);
  cursor:pointer;font-family:inherit;border-bottom:2.5px solid transparent;
  white-space:nowrap;transition:color .2s,border-color .2s;
}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* PAGES */
.page{display:none;padding:14px 14px 100px;max-width:640px;margin:0 auto}
.page.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.sec-title{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}

/* KPI */
.kpi-row{display:flex;gap:10px;flex-wrap:wrap}
.kpi{flex:1;min-width:130px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.kpi .kl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.06em;margin-bottom:4px}
.kpi .kv{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--accent);line-height:1.1}
.kpi .ks{font-size:10px;color:var(--muted);margin-top:3px}

/* HERO */
.hero{background:var(--accent);border-radius:16px;padding:18px;margin-bottom:14px;color:#FDF8F2}
.hero .hl{font-size:11px;opacity:.75;margin-bottom:4px}
.hero .hv{font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1}
.hero .hs{font-size:12px;opacity:.7;margin-top:6px}
.hero-row{display:flex;gap:18px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)}
.hero-row .hi p{font-size:10px;opacity:.7}
.hero-row .hi b{font-size:13px;font-variant-numeric:tabular-nums}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:4px}
input,select,textarea{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:9px 11px;color:var(--text);font-size:13px;font-family:inherit;outline:none;
  transition:border-color .2s;
}
input:focus,select:focus{border-color:var(--accent2)}
.btn-primary{
  background:var(--accent);color:var(--card);border:none;border-radius:9px;
  padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;
  transition:opacity .2s;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary:active{opacity:.8}
.btn-sm{
  background:var(--bg);color:var(--muted);border:1px solid var(--border);
  border-radius:7px;padding:5px 11px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s;
}
.btn-sm.active{background:var(--accent);color:var(--card);border-color:var(--accent)}
.btn-danger{
  background:#FEF0F0;color:var(--red);border:1px solid #E8BEBE;
  border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;
}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:360px}
th{padding:8px 10px;font-size:10px;font-weight:800;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.05em}
td{padding:9px 10px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}

/* BAR */
.bar-row{margin-bottom:12px}
.bar-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.bar-label{font-size:12px;color:var(--text)}
.bar-right{display:flex;align-items:center;gap:8px}
.bar-pct{font-size:12px;font-variant-numeric:tabular-nums;color:var(--muted)}
.bar-track{background:var(--bg);border-radius:4px;height:8px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* BADGE */
.badge{border-radius:6px;padding:2px 8px;font-size:10px;font-weight:800;display:inline-block}
.badge-good{background:#EBF5EB;color:var(--green);border:1px solid #BAD8BA}
.badge-ok{background:#FEF9E0;color:var(--yellow);border:1px solid #E8D898}
.badge-bad{background:#FEF0F0;color:var(--red);border:1px solid #E8BEBE}

/* P&L */
.pl-result{border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid}
.pl-result.pos{background:#F0F7EF;border-color:#BEDEBE}
.pl-result.neg{background:#FEF0F0;border-color:#E8BEBE}
.pl-result .pl-label{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;margin-bottom:6px}
.pl-result .pl-val{font-size:32px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1}
.pl-result .pl-sub{font-size:12px;color:var(--muted);margin-top:6px}

/* EXPENSE ROW */
.exp-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.exp-row:last-child{border-bottom:none}
.exp-row .en{font-size:13px;color:var(--text)}
.exp-row .ev{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}

/* MONTH GRID */
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.month-cell{
  background:var(--card2);border:1px solid var(--border);border-radius:10px;
  padding:12px 8px;cursor:pointer;transition:all .2s;text-align:center;
}
.month-cell.sel{border-color:var(--accent);background:#FBF0E3}
.month-cell .mc-name{font-size:13px;font-weight:700;color:var(--text)}
.month-cell .mc-val{font-size:11px;font-variant-numeric:tabular-nums;color:var(--accent);font-weight:700;margin-top:2px}
.month-cell .mc-gr{font-size:10px;margin-top:2px;font-variant-numeric:tabular-nums}

/* SEG */
.seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}

/* TOAST */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:var(--card);border-radius:20px;padding:10px 20px;
  font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;
  z-index:999;white-space:nowrap;max-width:80vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LOGOUT BTN */
.logout-btn{
  background:transparent;border:1px solid var(--border);border-radius:7px;
  padding:5px 10px;font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit;
}

/* RESPONSIVE */
@media(max-width:480px){
  .form-grid{grid-template-columns:1fr}
  .kpi{min-width:100px}
}
</style>
</head>
<body>

<!-- ══ LOADING ═════════════════════════════════════════ -->
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)">連線中…</div>
</div>

<!-- ══ AUTH SCREEN ══════════════════════════════════════ -->
<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="auth-logo">🌸</div>
    <div class="auth-title">小花食堂</div>
    <div class="auth-sub">營運記帳管理系統</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">登入</button>
      <button class="auth-tab" id="tab-reg" onclick="switchAuthTab('reg')">註冊</button>
    </div>
    <div class="auth-field">
      <label>電子郵件</label>
      <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label>密碼</label>
      <input type="password" id="auth-pw" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="auth-field" id="auth-pw2-wrap" style="display:none">
      <label>確認密碼</label>
      <input type="password" id="auth-pw2" placeholder="再次輸入密碼">
    </div>
    <button class="auth-btn" id="auth-submit-btn" onclick="doEmailAuth()">登入</button>
    <div class="auth-divider">或</div>
    <button class="auth-google" onclick="doGoogleAuth()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      使用 Google 帳號登入
    </button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- ══ APP ══════════════════════════════════════════════ -->
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div>
      <h1>🌸 小花食堂</h1>
      <div class="tbar-date" id="today-display"></div>
    </div>
    <div class="tbar-right">
      <div style="text-align:right">
        <div style="font-size:9px;color:var(--muted);display:flex;align-items:center;gap:3px">
          <span class="sync-dot" id="sync-dot"></span>
          <span id="sync-label">同步中</span>
        </div>
        <div class="tbar-rev" id="header-today-rev">—</div>
      </div>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </div>

  <!-- NAV -->
  <div id="nav">
    <button class="nav-btn active" onclick="showPage('p0',this)">📊 總覽</button>
    <button class="nav-btn" onclick="showPage('p1',this)">📋 每日</button>
    <button class="nav-btn" onclick="showPage('p2',this)">📦 進貨</button>
    <button class="nav-btn" onclick="showPage('p3',this)">👥 人事</button>
    <button class="nav-btn" onclick="showPage('p4',this)">📅 月報</button>
    <button class="nav-btn" onclick="showPage('p5',this)">📈 年度</button>
    <button class="nav-btn" onclick="showPage('p6',this)">🥬 食材</button>
  </div>

  <!-- PAGE 0: OVERVIEW -->
  <div class="page active" id="p0"></div>

  <!-- PAGE 1: DAILY -->
  <div class="page" id="p1">
    <div class="card">
      <div class="sec-title">新增每日營業額</div>
      <div class="form-grid">
        <div class="field"><label>日期</label><input type="date" id="rev-date"></div>
        <div class="field"><label>單數</label><input type="number" id="rev-orders" placeholder="0"></div>
        <div class="field"><label>總營業額（元）</label><input type="number" id="rev-amount" placeholder="0"></div>
        <div class="field"><label>備註</label><input type="text" id="rev-note" placeholder="補充說明"></div>
      </div>
      <button class="btn-primary" style="margin-top:12px" onclick="addRevenue()">＋ 新增紀錄</button>
    </div>
    <div class="card">
      <div class="seg">
        <button class="btn-sm active" id="rv-d" onclick="setRevView('day',this)">每日</button>
        <button class="btn-sm" id="rv-m" onclick="setRevView('month',this)">月彙整</button>
        <button class="btn-sm" id="rv-y" onclick="setRevView('year',this)">年彙整</button>
        <select id="rv-year" onchange="renderRevTable()" style="width:auto;padding:5px 8px;font-size:12px"></select>
        <select id="rv-month" onchange="renderRevTable()" style="width:auto;padding:5px 8px;font-size:12px"></select>
      </div>
      <div id="rev-table-wrap"></div>
    </div>
  </div>

  <!-- PAGE 2: INVENTORY -->
  <div class="page" id="p2">
    <div class="card">
      <div class="sec-title">帳上餘額</div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="kpi" style="flex:1;min-width:120px">
          <div class="kl">目前餘額</div>
          <div class="kv" id="inv-balance-val">$0</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex:1;min-width:180px">
          <input type="number" id="topup-amount" placeholder="儲值金額" style="flex:1">
          <button class="btn-primary" onclick="doTopUp()">＋ 儲值</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">新增進貨紀錄</div>
      <div class="form-grid">
        <div class="field"><label>日期</label><input type="date" id="inv-date"></div>
        <div class="field"><label>類別</label>
          <select id="inv-cat" onchange="updateInvSuppliers()">
            <option value="A">A 食材</option>
            <option value="B">B 耗材</option>
          </select>
        </div>
        <div class="field"><label>廠商</label><select id="inv-supplier"></select></div>
        <div class="field"><label>品名</label><input type="text" id="inv-item" placeholder="品名"></div>
        <div class="field"><label>數量</label><input type="number" id="inv-qty" placeholder="0" oninput="calcInvTotal()"></div>
        <div class="field"><label>單位</label><input type="text" id="inv-unit" placeholder="份/盒/袋"></div>
        <div class="field"><label>單價（元）</label><input type="number" id="inv-uprice" placeholder="0" oninput="calcInvTotal()"></div>
        <div class="field"><label>小計（元）</label><input type="number" id="inv-total" placeholder="自動計算"></div>
      </div>
      <button class="btn-primary" style="margin-top:12px" onclick="addInventory()">＋ 新增進貨</button>
    </div>
    <div class="card">
      <div class="sec-title">本月進貨彙整</div>
      <div id="inv-summary"></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="sec-title" style="margin:0">進貨紀錄</div>
        <div style="display:flex;gap:6px">
          <select id="inv-fy" onchange="renderInvTable()" style="width:auto;padding:4px 8px;font-size:12px"></select>
          <select id="inv-fm" onchange="renderInvTable()" style="width:auto;padding:4px 8px;font-size:12px"></select>
        </div>
      </div>
      <div id="inv-table-wrap"></div>
    </div>
  </div>

  <!-- PAGE 3: PERSONNEL -->
  <div class="page" id="p3">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <select id="per-year" onchange="renderPersonnel()" style="width:auto;padding:7px 10px;font-size:13px"></select>
      <select id="per-month" onchange="renderPersonnel()" style="width:auto;padding:7px 10px;font-size:13px"></select>
    </div>
    <div class="card">
      <div class="sec-title">新增人事</div>
      <div class="form-grid">

<script>
// ─── FIREBASE INIT ────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyC_FATI2kfUTwkUebdcD4hOg5QmERQHhWY",
  authDomain: "a7015004-ai.firebaseapp.com",
  projectId: "a7015004-ai",
  storageBucket: "a7015004-ai.firebasestorage.app",
  messagingSenderId: "440988815682",
  appId: "1:440988815682:web:40ae1adf6bcc8d395ef8db"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
auth.languageCode = 'zh-TW';

// ─── STATE ───────────────────────────────────────────
let uid = null;
let revenue   = [];
let inventory = [];
let personnel = [];
let balance   = 50000;
let fixedExp  = { rent:35000, security:3500, delivery_car:4800, telecom:1200, electricity:4500, water:800 };
let otherExp  = [];
let ingStocks = {}; // { "2025-04": { last: 0, cur: 0 } }
let yrView    = 'monthly';
let revView   = 'day';

// ─── CONSTANTS ───────────────────────────────────────
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const INV_SUPPLIERS = {
  A: ['廣弘','富美','喆園','豆老爺','開元','國農','雞蛋','湯圓','弘軒','其他'],
  B: ['瓦斯','甫疄','米食家','其他']
};
const FIXED_KEYS   = ['rent','security','delivery_car','telecom','electricity','water'];
const FIXED_LABELS = { rent:'租金', security:'保全費', delivery_car:'子母車', telecom:'電信費', electricity:'電費', water:'水費' };

// ─── HELPERS ─────────────────────────────────────────
const pad    = n => String(n).padStart(2,'0');
const todayD = new Date();
const todayStr = `${todayD.getFullYear()}-${pad(todayD.getMonth()+1)}-${pad(todayD.getDate())}`;
const sumBy  = (arr,k) => arr.reduce((s,r)=>s+(Number(r[k])||0),0);
const money  = n => '$'+Math.abs(Math.round(n)).toLocaleString();
const pct    = (n,t) => t?((n/t)*100).toFixed(1):'0.0';
const growth = (c,p) => p?(((c-p)/p)*100).toFixed(1):null;

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
function setSyncStatus(s){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot)return;
  dot.className='sync-dot'+(s==='ok'?'':s==='sync'?' syncing':' offline');
  lbl.textContent=s==='ok'?'已同步':s==='sync'?'同步中':'離線';
}
function getYears(){
  const ys=new Set([todayD.getFullYear()]);
  revenue.forEach(r=>ys.add(Number(r.date.slice(0,4))));
  inventory.forEach(r=>ys.add(Number(r.date.slice(0,4))));
  personnel.forEach(r=>ys.add(Number(r.year)));
  return [...ys].sort((a,b)=>b-a);
}
function fillYearSelect(id,cur){
  const el=document.getElementById(id);if(!el)return;
  const val=el.value||cur||todayD.getFullYear();
  el.innerHTML=getYears().map(y=>`<option value="${y}"${y==val?' selected':''}>${y}年</option>`).join('');
}
function fillMonthSelect(id,cur){
  const el=document.getElementById(id);if(!el)return;
  const val=el.value||cur||(todayD.getMonth()+1);
  el.innerHTML=MONTHS.map((m,i)=>`<option value="${i+1}"${(i+1)==val?' selected':''}>${m}</option>`).join('');
}

// ─── AUTH ─────────────────────────────────────────────
let authMode='login';
function switchAuthTab(mode){
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-reg').classList.toggle('active',mode==='reg');
  document.getElementById('auth-submit-btn').textContent=mode==='login'?'登入':'註冊帳號';
  document.getElementById('auth-pw2-wrap').style.display=mode==='reg'?'':'none';
  document.getElementById('auth-err').textContent='';
}
function setAuthErr(msg){document.getElementById('auth-err').textContent=msg;}

async function doEmailAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-pw').value;
  const pw2=document.getElementById('auth-pw2').value;
  if(!email||!pw){setAuthErr('請填寫電子郵件與密碼');return;}
  if(authMode==='reg'&&pw!==pw2){setAuthErr('兩次密碼不一致');return;}
  document.getElementById('auth-submit-btn').textContent='請稍候…';
  try{
    if(authMode==='login'){
      await auth.signInWithEmailAndPassword(email,pw);
    }else{
      await auth.createUserWithEmailAndPassword(email,pw);
    }
  }catch(e){
    document.getElementById('auth-submit-btn').textContent=authMode==='login'?'登入':'註冊帳號';
    const msg={
      'auth/user-not-found':'找不到此帳號，請先註冊',
      'auth/wrong-password':'密碼錯誤',
      'auth/email-already-in-use':'此電子郵件已被使用',
      'auth/weak-password':'密碼至少需要 6 個字元',
      'auth/invalid-email':'電子郵件格式不正確',
    };
    setAuthErr(msg[e.code]||e.message);
  }
}

async function doGoogleAuth(){
  const provider=new firebase.auth.GoogleAuthProvider();
  try{ await auth.signInWithPopup(provider); }
  catch(e){ setAuthErr(e.message); }
}

async function doLogout(){
  if(!confirm('確定要登出？'))return;
  await auth.signOut();
}

// ─── FIRESTORE PATHS ──────────────────────────────────
const col = (name) => db.collection('users').doc(uid).collection(name);

// ─── LOAD ALL DATA ───────────────────────────────────
async function loadAllData(){
  setSyncStatus('sync');
  try{
    const [rv,iv,pv,cfg]=await Promise.all([
      col('revenue').orderBy('date','desc').get(),
      col('inventory').orderBy('date','desc').get(),
      col('personnel').orderBy('year').get(),
      col('config').doc('main').get(),
    ]);
    revenue   = rv.docs.map(d=>({id:d.id,...d.data()}));
    inventory = iv.docs.map(d=>({id:d.id,...d.data()}));
    personnel = pv.docs.map(d=>({id:d.id,...d.data()}));
    if(cfg.exists){
      const d=cfg.data();
      balance  = d.balance  ?? 50000;
      fixedExp = d.fixedExp ?? fixedExp;
      otherExp = d.otherExp ?? [];
      ingStocks= d.ingStocks ?? {};
    }
    setSyncStatus('ok');
    refreshAll();
  }catch(e){
    setSyncStatus('offline');
    console.error(e);
  }
}

async function saveConfig(){
  if(!uid)return;
  setSyncStatus('sync');
  try{
    await col('config').doc('main').set({balance,fixedExp,otherExp,ingStocks},{merge:true});
    setSyncStatus('ok');
  }catch(e){ setSyncStatus('offline'); }
}

// ─── AUTH STATE LISTENER ─────────────────────────────
auth.onAuthStateChanged(async user=>{
  document.getElementById('loading').style.display='none';
  if(user){
    uid=user.uid;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    await loadAllData();
  }else{
    uid=null;
    revenue=[];inventory=[];personnel=[];
    document.getElementById('app').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
  }
});

// ─── NAVIGATION ──────────────────────────────────────
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  refreshPage(id);
}
function refreshAll(){
  updateHeader();
  renderOverview();
  initRevPage();
  initInvPage();
  initPerPage();
  initPLPage();
  initYrPage();
  initIngPage();
}
function refreshPage(id){
  updateHeader();
  if(id==='p0')renderOverview();
  else if(id==='p1')initRevPage();
  else if(id==='p2')initInvPage();
  else if(id==='p3')initPerPage();
  else if(id==='p4')initPLPage();
  else if(id==='p5')initYrPage();
  else if(id==='p6')initIngPage();
}

// ─── HEADER ──────────────────────────────────────────
function updateHeader(){
  const el=document.getElementById('today-display');
  if(el)el.textContent=todayStr.replace(/-/g,'.');
  const tRev=revenue.find(r=>r.date===todayStr);
  const rv=document.getElementById('header-today-rev');
  if(rv)rv.textContent=tRev?money(tRev.total_amount):'—';
}

// ─── BAR HELPER ──────────────────────────────────────
function barRow(label,pctVal,color,showBadge){
  const badge=showBadge?`<span class="badge ${pctVal<=30?'badge-good':pctVal<=40?'badge-ok':'badge-bad'}">${pctVal<=30?'✓ 優良':pctVal<=40?'△ 尚可':'✗ 欠佳'}</span>`:'';
  return `<div class="bar-row">
    <div class="bar-meta"><span class="bar-label">${label}</span>
      <div class="bar-right">${badge}<span class="bar-pct">${pctVal}%</span></div></div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.min(pctVal,100)}%;background:${color}"></div></div>
  </div>`;
}

// ─── PAGE 0: OVERVIEW ────────────────────────────────
function renderOverview(){
  const ym=todayStr.slice(0,7);
  const mRev=revenue.filter(r=>r.date.startsWith(ym));
  const mInv=inventory.filter(r=>r.date.startsWith(ym));
  const mPer=personnel.filter(r=>r.year===todayD.getFullYear()&&r.month===(todayD.getMonth()+1));
  const tRev=revenue.find(r=>r.date===todayStr);
  const totalRev=sumBy(mRev,'total_amount');
  const totalInv=sumBy(mInv,'total_cost');
  const totalPer=sumBy(mPer,'total');
  const totalFixed=Object.values(fixedExp).reduce((s,v)=>s+Number(v),0);
  const totalOther=sumBy(otherExp,'amount');
  const totalExp=totalInv+totalPer+totalFixed+totalOther;
  const profit=totalRev-totalExp;
  const workDays=new Set(mRev.map(r=>r.date)).size;
  const avgDay=workDays?Math.round(totalRev/workDays):0;
  const prevYM=todayD.getMonth()===0?`${todayD.getFullYear()-1}-12`:`${todayD.getFullYear()}-${pad(todayD.getMonth())}`;
  const prevRev=sumBy(revenue.filter(r=>r.date.startsWith(prevYM)),'total_amount');
  const gr=growth(totalRev,prevRev);
  const invPct=Number(pct(totalInv,totalRev));
  const perPct=Number(pct(totalPer,totalRev));
  const grHtml=gr!==null?`<div class="hi"><p>vs 上月</p><b style="color:${Number(gr)>=0?'#A8E8A8':'#FFAAAA'}">${Number(gr)>=0?'▲':'▼'}${Math.abs(gr)}%</b></div>`:'';

  document.getElementById('p0').innerHTML=`
    <div class="hero">
      <div class="hl">今日 · ${todayStr}</div>
      <div class="hv">${tRev?money(tRev.total_amount):'尚未記帳'}</div>
      ${tRev?`<div class="hs">共 ${tRev.order_count} 單</div>`:''}
      <div class="hero-row">
        <div class="hi"><p>今日進貨</p><b>${money(sumBy(inventory.filter(r=>r.date===todayStr),'total_cost'))}</b></div>
        <div class="hi"><p>月累積營收</p><b>${money(totalRev)}</b></div>
        ${grHtml}
      </div>
    </div>
    <div class="card">
      <div class="sec-title">${ym} 本月損益概況</div>
      <div class="kpi-row">
        <div class="kpi"><div class="kl">月營業額</div><div class="kv">${money(totalRev)}</div><div class="ks">${workDays} 工作日 · 均 ${money(avgDay)}</div></div>
        <div class="kpi"><div class="kl">月支出合計</div><div class="kv" style="color:var(--red)">${money(totalExp)}</div><div class="ks">貨款＋人事＋固定</div></div>
      </div>
      <div class="kpi-row" style="margin-top:10px">
        <div class="kpi"><div class="kl">月實賺金額</div><div class="kv" style="color:${profit>=0?'var(--green)':'var(--red)'}">${profit>=0?'+':'-'}${money(profit).slice(1)}</div><div class="ks">${profit>=0?'🎉 本月盈餘':'⚠ 本月虧損'}</div></div>
        <div class="kpi"><div class="kl">平均日營業額</div><div class="kv" style="color:var(--accent2)">${money(avgDay)}</div></div>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">成本佔比分析</div>
      ${barRow('進貨佔比',invPct,'#C4906A',true)}
      ${barRow('人事佔比',perPct,'#8A7AAB',true)}
      ${barRow('固定成本',Number(pct(totalFixed,totalRev)),'#7A9AAB',false)}
    </div>`;
}

// ─── PAGE 1: REVENUE ─────────────────────────────────
function initRevPage(){
  const el=document.getElementById('rev-date');if(el)el.value=todayStr;
  fillYearSelect('rv-year',todayD.getFullYear());
  fillMonthSelect('rv-month',todayD.getMonth()+1);
  const rm=document.getElementById('rv-month');if(rm)rm.style.display=revView==='day'?'':'none';
  renderRevTable();
}
function setRevView(v,btn){
  revView=v;
  ['rv-d','rv-m','rv-y'].forEach(id=>{const b=document.getElementById(id);if(b)b.classList.remove('active')});
  btn.classList.add('active');
  const rm=document.getElementById('rv-month');if(rm)rm.style.display=v==='day'?'':'none';
  renderRevTable();
}
async function addRevenue(){
  const date=document.getElementById('rev-date').value;
  const orders=Number(document.getElementById('rev-orders').value)||0;
  const amount=Number(document.getElementById('rev-amount').value);
  const note=document.getElementById('rev-note').value.trim();
  if(!date||!amount){toast('請填寫日期與營業額');return;}
  setSyncStatus('sync');
  try{
    const existing=revenue.find(r=>r.date===date);
    if(existing){
      await col('revenue').doc(existing.id).set({date,order_count:orders,total_amount:amount,note});
      const idx=revenue.indexOf(existing);
      revenue[idx]={id:existing.id,date,order_count:orders,total_amount:amount,note};
    }else{
      const ref=await col('revenue').add({date,order_count:orders,total_amount:amount,note});
      revenue.unshift({id:ref.id,date,order_count:orders,total_amount:amount,note});
    }
    setSyncStatus('ok');toast('✓ 已儲存至雲端');
    document.getElementById('rev-orders').value='';
    document.getElementById('rev-amount').value='';
    document.getElementById('rev-note').value='';
    updateHeader();renderOverview();renderRevTable();
  }catch(e){setSyncStatus('offline');toast('⚠ 儲存失敗：'+e.message);}
}
async function delRevenue(id){
  if(!confirm('確定刪除？'))return;
  try{
    await col('revenue').doc(id).delete();
    revenue=revenue.filter(r=>r.id!==id);
    toast('已刪除');updateHeader();renderOverview();renderRevTable();
  }catch(e){toast('刪除失敗');}
}
function renderRevTable(){
  const yr=Number(document.getElementById('rv-year')?.value||todayD.getFullYear());
  const mo=Number(document.getElementById('rv-month')?.value||todayD.getMonth()+1);
  const wrap=document.getElementById('rev-table-wrap');if(!wrap)return;
  if(revView==='day'){
    const ym=`${yr}-${pad(mo)}`;
    const rows=revenue.filter(r=>r.date.startsWith(ym)).sort((a,b)=>b.date.localeCompare(a.date));
    const total=sumBy(rows,'total_amount');
    wrap.innerHTML=`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">${rows.length} 筆 · 合計 <b style="color:var(--accent)">${money(total)}</b></div>
      <div class="tbl-wrap"><table>
        <tr><th>日期</th><th>單數</th><th>營業額</th><th>備註</th><th></th></tr>
        ${rows.map(r=>`<tr>
          <td style="white-space:nowrap">${r.date}</td>
          <td style="font-variant-numeric:tabular-nums">${r.order_count}</td>
          <td style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">${money(r.total_amount)}</td>
          <td style="font-size:11px;color:var(--muted)">${r.note||'—'}</td>
          <td><button class="btn-danger" onclick="delRevenue('${r.id}')">刪</button></td>
        </tr>`).join('')}
      </table></div>`;
  }else if(revView==='month'){
    const map={};
    revenue.filter(r=>r.date.startsWith(`${yr}`)).forEach(r=>{
      const m=r.date.slice(5,7);if(!map[m])map[m]={m,days:0,orders:0,total:0};
      map[m].days++;map[m].orders+=r.order_count;map[m].total+=r.total_amount;
    });
    const rows=Object.values(map).sort((a,b)=>a.m.localeCompare(b.m));
    wrap.innerHTML=`<div class="tbl-wrap"><table>
      <tr><th>月份</th><th>工作天</th><th>單數</th><th>月營業額</th><th>均日</th></tr>
      ${rows.map(r=>`<tr>
        <td>${r.m}月</td><td>${r.days}天</td>
        <td style="font-variant-numeric:tabular-nums">${r.orders}</td>
        <td style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">${money(r.total)}</td>
        <td style="font-variant-numeric:tabular-nums;color:var(--muted)">${money(Math.round(r.total/r.days))}</td>
      </tr>`).join('')}
      <tr style="background:var(--card2)"><td><b>合計</b></td><td></td><td></td>
        <td style="font-weight:900;color:var(--accent)">${money(sumBy(rows,'total'))}</td><td></td></tr>
    </table></div>`;
  }else{
    wrap.innerHTML=getYears().map(y=>{
      const d=revenue.filter(r=>r.date.startsWith(`${y}`));
      return `<div style="padding:12px;background:var(--bg);border-radius:10px;border:1px solid var(--border);margin-bottom:8px">
        <div style="font-weight:700;color:var(--accent)">${y} 年</div>
        <div style="font-size:12px;color:var(--muted)">共 ${d.length} 個工作天 · 年營業額 <b style="color:var(--text);font-variant-numeric:tabular-nums">${money(sumBy(d,'total_amount'))}</b></div>
      </div>`;
    }).join('');
  }
}

// ─── PAGE 2: INVENTORY ───────────────────────────────
function initInvPage(){

  fillMonthSelect('inv-fm',todayD.getMonth()+1);

function updateInvSuppliers(){
  const cat=document.getElementById('inv-cat')?.value||'A';
  const sel=document.getElementById('inv-supplier');if(!sel)return;
  sel.innerHTML=INV_SUPPLIERS[cat].map(s=>`<option>${s}</option>`).join('');
}
function calcInvTotal(){
  const q=Number(document.getElementById('inv-qty').value)||0;
  const p=Number(document.getElementById('inv-uprice').value)||0;
  if(q&&p)document.getElementById('inv-total').value=q*p;
}
function renderInvBalance(){
  const el=document.getElementById('inv-balance-val');if(!el)return;
  el.textContent=money(balance);
  el.style.color=balance>=0?'var(--green)':'var(--red)';
}
async function doTopUp(){
  const amt=Number(document.getElementById('topup-amount').value);
  if(!amt){toast('請輸入儲值金額');return;}
  balance+=amt;
  await saveConfig();
  toast(`✓ 已儲值 ${money(amt)}`);
  document.getElementById('topup-amount').value='';
  renderInvBalance();
}
async function addInventory(){
  const date=document.getElementById('inv-date').value;
  const cat=document.getElementById('inv-cat').value;
  const supplier=document.getElementById('inv-supplier').value;
  const item=document.getElementById('inv-item').value.trim();
  const qty=Number(document.getElementById('inv-qty').value)||0;
  const unit=document.getElementById('inv-unit').value.trim();
  const uprice=Number(document.getElementById('inv-uprice').value)||0;
  const total=Number(document.getElementById('inv-total').value)||qty*uprice;
  if(!date||!item||!total){toast('請填寫日期、品名與金額');return;}
  balance-=total;
  setSyncStatus('sync');
  try{
    const data={date,cat,supplier,item_name:item,qty,unit,unit_cost:uprice,total_cost:total,balance_after:balance};
    const ref=await col('inventory').add(data);
    inventory.unshift({id:ref.id,...data});
    await saveConfig();
    toast('✓ 已儲存至雲端');
    document.getElementById('inv-item').value='';
    document.getElementById('inv-qty').value='';
    document.getElementById('inv-uprice').value='';
    document.getElementById('inv-total').value='';
    renderInvBalance();renderInvSummary();renderInvTable();renderOverview();
  }catch(e){balance+=total;setSyncStatus('offline');toast('儲存失敗');}
}
async function delInventory(id){
  if(!confirm('確定刪除？'))return;
  const item=inventory.find(r=>r.id===id);
  if(item){balance+=item.total_cost;}
  try{
    await col('inventory').doc(id).delete();
    inventory=inventory.filter(r=>r.id!==id);
    await saveConfig();
    toast('已刪除');renderInvBalance();renderInvSummary();renderInvTable();
  }catch(e){if(item)balance-=item.total_cost;toast('刪除失敗');}
}
function renderInvSummary(){
  const ym=todayStr.slice(0,7);
  const mI=inventory.filter(r=>r.date.startsWith(ym));
  const catA=mI.filter(r=>r.cat==='A');
  const catB=mI.filter(r=>r.cat==='B');

  const supRows=Object.values(supMap).sort((a,b)=>b.t-a.t);
  const el=document.getElementById('inv-summary');if(!el)return;
  el.innerHTML=`
    <div class="kpi-row" style="margin-bottom:10px">
      <div class="kpi"><div class="kl">A 食材合計</div><div class="kv" style="color:var(--red)">${money(tA)}</div></div>
      <div class="kpi"><div class="kl">B 耗材合計</div><div class="kv" style="color:var(--red)">${money(tB)}</div></div>
    </div>
    <div style="padding:10px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border);display:flex;justify-content:space-between;margin-bottom:12px">
      <span style="font-weight:700">本月進貨共計</span>
      <span style="font-weight:900;color:var(--red);font-variant-numeric:tabular-nums">${money(tA+tB)}</span>
    </div>
    ${supRows.length?`<div class="tbl-wrap"><table>
      <tr><th>廠商</th><th>類別</th><th>支出金額</th></tr>
      ${supRows.map(r=>`<tr>
        <td>${r.s}</td>
        <td><span style="font-size:10px;background:${r.cat==='A'?'#EBF5EB':'#EBF0F8'};color:${r.cat==='A'?'var(--green)':'var(--blue)'};border-radius:4px;padding:1px 5px;font-weight:700">${r.cat}</span></td>
        <td style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">${money(r.t)}</td>
      </tr>`).join('')}
    </table></div>`:''}`;
}
function renderInvTable(){
  const yr=document.getElementById('inv-fy')?.value;
  const mo=document.getElementById('inv-fm')?.value;
  const ym=yr&&mo?`${yr}-${pad(mo)}`:null;
  const rows=[...inventory].filter(r=>!ym||r.date.startsWith(ym)).sort((a,b)=>b.date.localeCompare(a.date));

    ${rows.slice(0,80).map(r=>`<tr>
      <td style="font-size:11px;white-space:nowrap">${r.date}</td>
      <td><span style="font-size:10px;background:${r.cat==='A'?'#EBF5EB':'#EBF0F8'};color:${r.cat==='A'?'var(--green)':'var(--blue)'};border-radius:4px;padding:1px 5px;font-weight:700">${r.cat}</span></td>
      <td style="font-size:11px">${r.supplier}</td>
      <td>${r.item_name}</td>
      <td style="color:var(--red);font-weight:700;font-variant-numeric:tabular-nums">-${money(r.total_cost).slice(1)}</td>

// ─── PAGE 4: MONTHLY P&L ─────────────────────────────
function initPLPage(){
  fillYearSelect('pl-year',todayD.getFullYear());
  fillMonthSelect('pl-month',todayD.getMonth()+1);
  renderPL();
}
function getMonthStat(y,m){
  const ym=`${y}-${pad(m)}`;
  const mRev=revenue.filter(r=>r.date.startsWith(ym));
  const mInv=inventory.filter(r=>r.date.startsWith(ym));
  const mPer=personnel.filter(r=>r.year===Number(y)&&r.month===Number(m));
  const totalRev=sumBy(mRev,'total_amount');
  const totalInv=sumBy(mInv,'total_cost');
  const totalPer=sumBy(mPer,'total');
  const totalFixed=Object.values(fixedExp).reduce((s,v)=>s+Number(v),0);
  const totalOther=sumBy(otherExp,'amount');
  const profit=totalRev-totalInv-totalPer-totalFixed-totalOther;
  const days=new Set(mRev.map(r=>r.date)).size;
  return{totalRev,totalInv,totalPer,totalFixed,totalOther,profit,days,orders:sumBy(mRev,'order_count')};
}
function renderPL(){
  const yr=Number(document.getElementById('pl-year')?.value||todayD.getFullYear());
  const mo=Number(document.getElementById('pl-month')?.value||todayD.getMonth()+1);
  const s=getMonthStat(yr,mo);
  const invPct=Number(pct(s.totalInv,s.totalRev));
  const perPct=Number(pct(s.totalPer,s.totalRev));
  const avgDay=s.days?Math.round(s.totalRev/s.days):0;

  const fixedRows=FIXED_KEYS.map(k=>`
    <div class="exp-row">
      <span class="en">${FIXED_LABELS[k]}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="number" value="${fixedExp[k]||0}" style="width:100px;padding:5px 8px;font-size:12px;text-align:right"
          onchange="fixedExp['${k}']=Number(this.value);saveConfig();renderPL()">
      </div>
    </div>`).join('');

  const otherRows=otherExp.map(o=>`
    <div class="exp-row">
      <span class="en">${o.label}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="ev" style="color:var(--red)">${money(o.amount)}</span>
        <button class="btn-danger" onclick="delOtherExp(${o.id})">刪</button>
      </div>
    </div>`).join('');

  const el=document.getElementById('pl-content');if(!el)return;
  el.innerHTML=`
    <div class="pl-result ${s.profit>=0?'pos':'neg'}">
      <div class="pl-label">${yr}/${pad(mo)} · 損益結算</div>
      <div class="pl-val" style="color:${s.profit>=0?'var(--green)':'var(--red)'}">${s.profit>=0?'+':'-'}${money(s.profit).slice(1)}</div>
      <div class="pl-sub">${s.profit>=0?'🎉 本月盈餘':'⚠ 本月虧損'} · ${s.days} 個工作日 · 均日 ${money(avgDay)}</div>
    </div>
    <div class="card">
      <div class="sec-title">收支明細</div>
      <div class="exp-row"><span class="en" style="font-weight:700">總營業額</span><span class="ev" style="color:var(--green)">${money(s.totalRev)}</span></div>
      <div class="exp-row"><span class="en">貨款（進貨）</span><span class="ev" style="color:var(--red)">-${money(s.totalInv).slice(1)}</span></div>
      <div class="exp-row"><span class="en">人事薪資</span><span class="ev" style="color:var(--red)">-${money(s.totalPer).slice(1)}</span></div>
      ${FIXED_KEYS.map(k=>`<div class="exp-row"><span class="en">${FIXED_LABELS[k]}</span><span class="ev" style="color:var(--red)">-${money(fixedExp[k]||0).slice(1)}</span></div>`).join('')}
      ${otherExp.map(o=>`<div class="exp-row"><span class="en">${o.label}</span><span class="ev" style="color:var(--red)">-${money(o.amount).slice(1)}</span></div>`).join('')}
      <div class="exp-row" style="border-top:2px solid var(--border);padding-top:10px">
        <span style="font-weight:900;font-size:15px">實賺金額</span>
        <span style="font-size:22px;font-weight:900;font-variant-numeric:tabular-nums;color:${s.profit>=0?'var(--green)':'var(--red)'}">${s.profit>=0?'+':'-'}${money(s.profit).slice(1)}</span>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">固定支出設定（可修改）</div>
      ${fixedRows}
    </div>
    <div class="card">
      <div class="sec-title">其他支出項目</div>
      ${otherRows}
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <input type="text" id="other-label" placeholder="項目名稱" style="flex:1;min-width:100px">
        <input type="number" id="other-amount" placeholder="金額" style="flex:1;min-width:80px">
        <button class="btn-primary" onclick="addOtherExp()">＋</button>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">成本佔比分析</div>
      ${barRow('進貨佔比',invPct,'#C4906A',true)}
      <p style="font-size:11px;color:${invPct<=30?'var(--green)':invPct<=40?'var(--yellow)':'var(--red)'};margin-bottom:14px">
        ${invPct<=30?'✓ 優良 — 食材成本控管良好':invPct<=40?'△ 尚可 — 建議適度控制進貨':'✗ 欠佳 — 食材成本偏高，請檢視採購'}
      </p>
      ${barRow('人事佔比',perPct,'#8A7AAB',true)}
      <p style="font-size:11px;color:${perPct<=30?'var(--green)':perPct<=40?'var(--yellow)':'var(--red)'}">
        ${perPct<=30?'✓ 優良 — 人事成本控管良好':perPct<=40?'△ 尚可 — 可留意排班效率':'✗ 欠佳 — 人事成本偏高，請檢視排班'}
      </p>
    </div>`;
}
async function addOtherExp(){
  const label=document.getElementById('other-label')?.value.trim();
  const amount=Number(document.getElementById('other-amount')?.value);
  if(!label||!amount){toast('請填寫項目名稱與金額');return;}
  otherExp.push({id:Date.now(),label,amount});
  await saveConfig();renderPL();
}
async function delOtherExp(id){
  otherExp=otherExp.filter(o=>o.id!==id);
  await saveConfig();renderPL();
}

        </div>
        <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
          ${[['本月',cur.totalRev,'var(--accent)'],['上月',prevM.totalRev,'var(--muted)'],['差額',cur.totalRev-prevM.totalRev,cur.totalRev>=prevM.totalRev?'var(--green)':'var(--red)']].map(([l,v,c])=>`
            <div style="background:var(--bg);border-radius:8px;border:1px solid var(--border);padding:10px 6px">
              <div style="font-size:10px;color:var(--muted)">${l}</div>
              <div style="font-size:13px;font-weight:700;color:${c};font-variant-numeric:tabular-nums">${l==='差額'&&v>0?'+':''}${money(v)}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }else{
    const yB=Number(document.getElementById('yr-year-b')?.value||yA-1);
    const aStats=MONTHS.map((_,i)=>({month:i+1,...getMonthStat(yA,i+1)}));
    const bStats=MONTHS.map((_,i)=>({month:i+1,...getMonthStat(yB,i+1)}));
    const aTot=sumBy(aStats,'totalRev');const bTot=sumBy(bStats,'totalRev');
    const gr=growth(aTot,bTot);
    wrap.innerHTML=`<div class="card">
      <div class="kpi-row" style="margin-bottom:12px">
        <div class="kpi"><div class="kl">${yA} 年總營收</div><div class="kv">${money(aTot)}</div></div>
        <div class="kpi"><div class="kl">${yB} 年總營收</div><div class="kv" style="color:var(--muted)">${money(bTot)}</div></div>
      </div>
      ${bTot>0?`<div style="padding:12px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border);margin-bottom:14px">
        <div style="font-size:10px;color:var(--muted)">年度成長率（${yB}→${yA}）</div>
        <div style="font-size:24px;font-weight:900;font-variant-numeric:tabular-nums;color:${aTot>=bTot?'var(--green)':'var(--red)'}">${aTot>=bTot?'▲':'▼'}${Math.abs(gr)}%</div>
      </div>`:''}
      <div class="sec-title">逐月對比</div>
      <div class="tbl-wrap"><table>
        <tr><th>月份</th><th>${yA}</th><th>${yB}</th><th>增減</th></tr>
        ${aStats.map((a,i)=>{
          const b=bStats[i];const gr=growth(a.totalRev,b.totalRev);
          return `<tr>
            <td><b>${MONTHS[i]}</b></td>
            <td style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">${a.totalRev?money(a.totalRev):'—'}</td>
            <td style="color:var(--muted);font-variant-numeric:tabular-nums">${b.totalRev?money(b.totalRev):'—'}</td>
            <td style="font-variant-numeric:tabular-nums;color:${gr===null?'var(--muted)':Number(gr)>=0?'var(--green)':'var(--red)'};font-size:12px">${gr!==null?(Number(gr)>=0?'▲':'▼')+Math.abs(gr)+'%':'—'}</td>
          </tr>`;
        }).join('')}
      </table></div>
    </div>`;
  }
}

// ─── PAGE 6: INGREDIENTS ─────────────────────────────
function initIngPage(){
  fillYearSelect('ing-year',todayD.getFullYear());
  fillMonthSelect('ing-month',todayD.getMonth()+1);
  const ym=`${todayD.getFullYear()}-${pad(todayD.getMonth()+1)}`;
  const st=ingStocks[ym]||{last:0,cur:0};
  const lsEl=document.getElementById('ing-last-stock');
  const csEl=document.getElementById('ing-cur-stock');
  if(lsEl)lsEl.value=st.last||'';
  if(csEl)csEl.value=st.cur||'';
  renderIngredients();
}
async function saveIngStocks(){
  const yr=document.getElementById('ing-year')?.value||todayD.getFullYear();
  const mo=document.getElementById('ing-month')?.value||todayD.getMonth()+1;
  const ym=`${yr}-${pad(mo)}`;
  const last=Number(document.getElementById('ing-last-stock')?.value)||0;
  const cur=Number(document.getElementById('ing-cur-stock')?.value)||0;
  ingStocks[ym]={last,cur};
  await saveConfig();
}
function renderIngredients(){
  const yr=Number(document.getElementById('ing-year')?.value||todayD.getFullYear());
  const mo=Number(document.getElementById('ing-month')?.value||todayD.getMonth()+1);
  const ym=`${yr}-${pad(mo)}`;
  const st=ingStocks[ym]||{last:0,cur:0};
  const lastStock=Number(document.getElementById('ing-last-stock')?.value)||st.last||0;
  const curStock=Number(document.getElementById('ing-cur-stock')?.value)||st.cur||0;
  const mInvA=inventory.filter(r=>r.date.startsWith(ym)&&r.cat==='A');
  const mInvAll=inventory.filter(r=>r.date.startsWith(ym));
  const totalPurchaseA=sumBy(mInvA,'total_cost');
  const totalPurchaseAll=sumBy(mInvAll,'total_cost');
  const actualCost=totalPurchaseA+lastStock-curStock;
  const el=document.getElementById('ing-result');if(!el)return;
  el.innerHTML=`
    <div class="card">
      <div class="sec-title">食材成本計算公式</div>
      <div class="exp-row"><span class="en">本月食材進貨（A類）</span><span class="ev" style="color:var(--accent)">${money(totalPurchaseA)}</span></div>
      <div class="exp-row"><span class="en">＋ 上月剩餘庫存</span><span class="ev">${money(lastStock)}</span></div>
      <div class="exp-row"><span class="en">－ 本月底剩餘庫存</span><span class="ev" style="color:var(--red)">-${money(curStock).slice(1)}</span></div>
      <div class="exp-row" style="border-top:2px solid var(--border);padding-top:10px">
        <span style="font-weight:900">＝ 本月實際消耗成本</span>
        <span style="font-size:22px;font-weight:900;color:var(--red);font-variant-numeric:tabular-nums">${money(actualCost)}</span>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">本月叫貨總覽 ${ym}</div>
      <div class="kpi-row">
        <div class="kpi"><div class="kl">食材叫貨（A）</div><div class="kv" style="color:var(--accent)">${money(totalPurchaseA)}</div><div class="ks">${mInvA.length} 筆</div></div>
        <div class="kpi"><div class="kl">全部進貨合計</div><div class="kv" style="color:var(--red)">${money(totalPurchaseAll)}</div><div class="ks">${mInvAll.length} 筆</div></div>
      </div>
    </div>`;
  // supplier breakdown
  const supMap={};
  mInvA.forEach(r=>{if(!supMap[r.supplier])supMap[r.supplier]={s:r.supplier,total:0,count:0};supMap[r.supplier].total+=r.total_cost;supMap[r.supplier].count++;});
  const supRows=Object.values(supMap).sort((a,b)=>b.total-a.total);
  const det=document.getElementById('ing-detail');if(!det)return;
  det.innerHTML=`<div class="tbl-wrap"><table>
    <tr><th>廠商</th><th>筆數</th><th>合計金額</th></tr>
    ${supRows.map(r=>`<tr>
      <td>${r.s}</td><td style="color:var(--muted)">${r.count}筆</td>
      <td style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">${money(r.total)}</td>
    </tr>`).join('')}
    ${supRows.length?`<tr style="background:var(--card2)"><td><b>合計</b></td><td></td><td style="font-weight:900;color:var(--accent)">${money(totalPurchaseA)}</td></tr>`:'<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:20px">本月尚無食材進貨紀錄</td></tr>'}
  </table></div>`;
}
</script>
