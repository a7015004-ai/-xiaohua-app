<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="小花食堂">
<title>🌸 小花食堂 · 營運記帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #F5EDE0;
  --card:    #FDF8F2;
  --card2:   #F9F0E3;
  --border:  #E2C9A8;
  --accent:  #9E7248;
  --accent2: #C49568;
  --text:    #3A2410;
  --muted:   #8B6040;
  --green:   #4F7942;
  --red:     #9B3A3A;
  --yellow:  #7A6518;
  --shadow:  0 2px 12px rgba(120,80,40,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 15px; }
body { font-family: 'Noto Sans TC', 'PingFang TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── TOP BAR ── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
  box-shadow: var(--shadow);
}
#topbar h1 { font-size: 18px; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; }
#topbar .date { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }

/* ── NAV TABS ── */
#nav {
  background: var(--card); border-bottom: 1px solid var(--border);
  display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; gap: 0; padding: 0 8px;
}
#nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex-shrink: 0; border: none; background: transparent;
  padding: 11px 14px; font-size: 12px; font-weight: 700;
  color: var(--muted); cursor: pointer; font-family: inherit;
  border-bottom: 2.5px solid transparent; white-space: nowrap;
  transition: color .2s, border-color .2s;
}
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── PAGES ── */
.page { display: none; padding: 14px 14px 90px; max-width: 640px; margin: 0 auto; }
.page.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.sec-title {
  font-size: 10px; font-weight: 800; color: var(--muted);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px;
}

/* ── KPI ROW ── */
.kpi-row { display: flex; gap: 10px; flex-wrap: wrap; }
.kpi {
  flex: 1; min-width: 130px; background: var(--card2);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
}
.kpi .kpi-label { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: .06em; margin-bottom: 4px; }
.kpi .kpi-val { font-size: 20px; font-weight: 900; font-variant-numeric: tabular-nums; color: var(--accent); line-height: 1.1; }
.kpi .kpi-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ── HERO CARD ── */
.hero {
  background: var(--accent); border-radius: 16px; padding: 18px;
  margin-bottom: 14px; color: #FDF8F2;
}
.hero .hero-label { font-size: 11px; opacity: .75; margin-bottom: 4px; }
.hero .hero-val { font-size: 32px; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; }
.hero .hero-sub { font-size: 12px; opacity: .7; margin-top: 6px; }
.hero-row { display: flex; gap: 20px; margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.2); }
.hero-row .hi { }
.hero-row .hi p { font-size: 10px; opacity: .7; }
.hero-row .hi b { font-size: 14px; font-variant-numeric: tabular-nums; }

/* ── FORMS ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field label { display: block; font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .06em; margin-bottom: 4px; }
input, select, textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 11px; color: var(--text);
  font-size: 13px; font-family: inherit; outline: none;
  transition: border-color .2s;
}
input:focus, select:focus { border-color: var(--accent2); }
.btn-primary {
  background: var(--accent); color: var(--card); border: none;
  border-radius: 9px; padding: 10px 18px; font-weight: 700;
  font-size: 13px; cursor: pointer; font-family: inherit;
  transition: opacity .2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary:active { opacity: .8; }
.btn-sm {
  background: var(--bg); color: var(--muted); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 11px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: inherit; white-space: nowrap;
  transition: all .2s;
}
.btn-sm.active { background: var(--accent); color: var(--card); border-color: var(--accent); }
.btn-danger {
  background: #FEF0F0; color: var(--red); border: 1px solid #E8BEBE;
  border-radius: 6px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; font-family: inherit;
}

/* ── TABLES ── */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; min-width: 380px; }
th { padding: 8px 10px; font-size: 10px; font-weight: 800; color: var(--muted); text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; letter-spacing: .05em; }
td { padding: 9px 10px; font-size: 13px; color: var(--text); border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }

/* ── BAR CHART ── */
.bar-row { margin-bottom: 12px; }
.bar-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.bar-label { font-size: 12px; color: var(--text); }
.bar-right { display: flex; align-items: center; gap: 8px; }
.bar-pct { font-size: 12px; font-variant-numeric: tabular-nums; color: var(--muted); }
.bar-track { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; border: 1px solid var(--border); }
.bar-fill { height: 100%; border-radius: 4px; transition: width .6s cubic-bezier(.4,0,.2,1); }

/* ── BADGE ── */
.badge {
  border-radius: 6px; padding: 2px 8px; font-size: 10px; font-weight: 800;
  display: inline-block;
}
.badge-good { background: #EBF5EB; color: var(--green); border: 1px solid #BAD8BA; }
.badge-ok   { background: #FEF9E0; color: var(--yellow); border: 1px solid #E8D898; }
.badge-bad  { background: #FEF0F0; color: var(--red);    border: 1px solid #E8BEBE; }

/* ── P&L RESULT ── */
.pl-result {
  border-radius: 14px; padding: 16px; margin-bottom: 14px;
  border: 1px solid;
}
.pl-result.positive { background: #F0F7EF; border-color: #BEDEBE; }
.pl-result.negative { background: #FEF0F0; border-color: #E8BEBE; }
.pl-result .pl-label { font-size: 10px; font-weight: 800; color: var(--muted); letter-spacing: .1em; margin-bottom: 6px; }
.pl-result .pl-val { font-size: 34px; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; }
.pl-result .pl-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* ── SEGMENT CONTROL ── */
.seg { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }

/* ── PILL TABS (sub) ── */
.pill-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }

/* ── MONTH GRID ── */
.month-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.month-cell {
  background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 10px; cursor: pointer; transition: all .2s; text-align: center;
}
.month-cell:active { opacity: .7; }
.month-cell.selected { border-color: var(--accent); background: #FBF0E3; }
.month-cell .mc-name { font-size: 13px; font-weight: 700; color: var(--text); }
.month-cell .mc-val { font-size: 12px; font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 700; margin-top: 2px; }
.month-cell .mc-gr { font-size: 10px; margin-top: 2px; font-variant-numeric: tabular-nums; }

/* ── EXPENSE ROW ── */
.exp-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.exp-row:last-child { border-bottom: none; }
.exp-row .exp-name { font-size: 13px; color: var(--text); }
.exp-row .exp-val { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: var(--card); border-radius: 20px;
  padding: 10px 20px; font-size: 13px; font-weight: 700;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 999; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── BOTTOM SAFE ── */
@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr; }
  .kpi { min-width: 100px; }
}
</style>
</head>
<body>

<div id="topbar">
  <div>
    <h1>🌸 小花食堂</h1>
    <div class="date" id="today-display"></div>
  </div>
  <div style="text-align:right">
    <div style="font-size:10px;color:var(--muted)">今日營收</div>
    <div style="font-size:16px;font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums" id="header-today-rev">—</div>
  </div>
</div>

<div id="nav">
  <button class="nav-btn active" onclick="showPage('p0',this)">📊 總覽</button>
  <button class="nav-btn" onclick="showPage('p1',this)">📋 每日</button>
  <button class="nav-btn" onclick="showPage('p2',this)">📦 進貨</button>
  <button class="nav-btn" onclick="showPage('p3',this)">👥 人事</button>
  <button class="nav-btn" onclick="showPage('p4',this)">📅 月報</button>
  <button class="nav-btn" onclick="showPage('p5',this)">📈 年度</button>
  <button class="nav-btn" onclick="showPage('p6',this)">🥬 食材</button>
</div>

<!-- ══════════════════ PAGE 0: 今日總覽 ══════════════════ -->
<div class="page active" id="p0"></div>

<!-- ══════════════════ PAGE 1: 每日記帳 ══════════════════ -->
<div class="page" id="p1">
  <div class="card">
    <div class="sec-title">新增每日營業額</div>
    <div class="form-grid">
      <div class="field"><label>日期</label><input type="date" id="rev-date"></div>
      <div class="field"><label>單數</label><input type="number" id="rev-orders" placeholder="0"></div>
      <div class="field"><label>總營業額（元）</label><input type="number" id="rev-amount" placeholder="0"></div>
      <div class="field"><label>備註</label><input type="text" id="rev-note" placeholder="補充說明"></div>
    </div>
    <button class="btn-primary" style="margin-top:12px" onclick="addRevenue()">＋ 新增紀錄</button>
  </div>
  <div class="card">
    <div class="seg">
      <button class="btn-sm active" id="rv-d" onclick="setRevView('day',this)">每日</button>
      <button class="btn-sm" id="rv-m" onclick="setRevView('month',this)">月彙整</button>
      <button class="btn-sm" id="rv-y" onclick="setRevView('year',this)">年彙整</button>
      <select id="rv-year" onchange="renderRevTable()" style="width:auto;padding:5px 8px;font-size:12px"></select>
      <select id="rv-month" onchange="renderRevTable()" style="width:auto;padding:5px 8px;font-size:12px;display:none"></select>
    </div>
    <div id="rev-table-wrap"></div>
  </div>
</div>

<!-- ══════════════════ PAGE 2: 進貨管理 ══════════════════ -->
<div class="page" id="p2">
  <div class="card">
    <div class="sec-title">帳上餘額</div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div class="kpi" style="flex:1;min-width:120px">
        <div class="kpi-label">目前餘額</div>
        <div class="kpi-val" id="inv-balance-val">$0</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex:1;min-width:180px">
        <input type="number" id="topup-amount" placeholder="儲值金額" style="flex:1">
        <button class="btn-primary" onclick="doTopUp()">＋ 儲值</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="sec-title">新增進貨紀錄</div>
    <div class="form-grid">
      <div class="field"><label>日期</label><input type="date" id="inv-date"></div>
      <div class="field"><label>類別</label>
        <select id="inv-cat" onchange="updateInvSuppliers()">
          <option value="A">A 食材</option>
          <option value="B">B 耗材</option>
        </select>
      </div>
      <div class="field"><label>廠商</label>
        <select id="inv-supplier"></select>
      </div>
      <div class="field"><label>品名</label><input type="text" id="inv-item" placeholder="品名"></div>
      <div class="field"><label>數量</label><input type="number" id="inv-qty" placeholder="0" oninput="calcInvTotal()"></div>
      <div class="field"><label>單位</label><input type="text" id="inv-unit" placeholder="份/盒/袋"></div>
      <div class="field"><label>單價（元）</label><input type="number" id="inv-uprice" placeholder="0" oninput="calcInvTotal()"></div>
      <div class="field"><label>小計（元）</label><input type="number" id="inv-total" placeholder="自動計算"></div>
    </div>
    <button class="btn-primary" style="margin-top:12px" onclick="addInventory()">＋ 新增進貨</button>
  </div>
  <div class="card">
    <div class="sec-title">本月進貨彙整</div>
    <div id="inv-summary"></div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="sec-title" style="margin:0">進貨紀錄</div>
      <div style="display:flex;gap:6px">
        <select id="inv-filter-year" onchange="renderInvTable()" style="width:auto;padding:4px 8px;font-size:12px"></select>
        <select id="inv-filter-month" onchange="renderInvTable()" style="width:auto;padding:4px 8px;font-size:12px"></select>
      </div>
    </div>
    <div id="inv-table-wrap"></div>
  </div>
</div>

<!-- ══════════════════ PAGE 3: 人事薪資 ══════════════════ -->
<div class="page" id="p3">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <select id="per-year" onchange="renderPersonnel()" style="width:auto;padding:7px 10px;font-size:13px"></select>
    <select id="per-month" onchange="renderPersonnel()" style="width:auto;padding:7px 10px;font-size:13px"></select>
  </div>
  <div class="card">
    <div class="sec-title">新增人事</div>
    <div class="form-grid">
      <div class="field"><label>姓名</label><input type="text" id="per-name" placeholder="員工姓名"></div>
      <div class="field"><label>職位</label>
        <select id="per-role">
          <option>店長</option><option>廚師</option><option>外場</option><option>收銀</option><option>工讀生</option>
        </select>
      </div>
      <div class="field"><label>時薪（元）</label><input type="number" id="per-rate" placeholder="168" oninput="calcPerTotal()"></div>
      <div class="field"><label>工時（小時）</label><input type="number" id="per-hours" placeholder="0" oninput="calcPerTotal()"></div>
      <div class="field"><label>獎金（元）</label><input type="number" id="per-bonus" placeholder="0" oninput="calcPerTotal()"></div>
      <div class="field"><label>預計薪資</label><div style="font-size:18px;font-weight:900;color:var(--accent);padding-top:8px;font-variant-numeric:tabular-nums" id="per-preview">$0</div></div>
    </div>
    <button class="btn-primary" style="margin-top:12px" onclick="addPersonnel()">＋ 新增人員</button>
  </div>
  <div class="card" id="per-table-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="sec-title" style="margin:0" id="per-table-title">薪資表</div>
      <div style="text-align:right">
        <div style="font-size:10px;color:var(--muted)">薪資總額</div>
        <div style="font-size:18px;font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums" id="per-total-val">$0</div>
      </div>
    </div>
    <div id="per-table-wrap"></div>
  </div>
</div>

<!-- ══════════════════ PAGE 4: 月報損益 ══════════════════ -->
<div class="page" id="p4">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <select id="pl-year" onchange="renderPL()" style="width:auto;padding:7px 10px;font-size:13px"></select>
    <select id="pl-month" onchange="renderPL()" style="width:auto;padding:7px 10px;font-size:13px"></select>
  </div>
  <div id="pl-content"></div>
</div>

<!-- ══════════════════ PAGE 5: 年度分析 ══════════════════ -->
<div class="page" id="p5">
  <div class="pill-tabs">
    <button class="btn-sm active" id="yr-tab-monthly" onclick="setYrView('monthly',this)">月度總覽</button>
    <button class="btn-sm" id="yr-tab-compare" onclick="setYrView('compare',this)">月份比較</button>
    <button class="btn-sm" id="yr-tab-yoy" onclick="setYrView('yoy',this)">年度對比</button>
  </div>
  <div id="yr-controls" style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"></div>
  <div id="yr-content"></div>
</div>

<!-- ══════════════════ PAGE 6: 食材管理 ══════════════════ -->
<div class="page" id="p6">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <select id="ing-year" onchange="renderIngredients()" style="width:auto;padding:7px 10px;font-size:13px"></select>
    <select id="ing-month" onchange="renderIngredients()" style="width:auto;padding:7px 10px;font-size:13px"></select>
  </div>
  <div class="card">
    <div class="sec-title">上月剩餘庫存</div>
    <div class="field" style="max-width:220px">
      <label>上月底剩餘庫存金額（元）</label>
      <input type="number" id="ing-last-stock" placeholder="0" oninput="renderIngredients()">
    </div>
  </div>
  <div class="card">
    <div class="sec-title">本月月底剩餘庫存</div>
    <div class="field" style="max-width:220px">
      <label>本月底剩餘庫存金額（元）</label>
      <input type="number" id="ing-cur-stock" placeholder="0" oninput="renderIngredients()">
    </div>
  </div>
  <div id="ing-result"></div>
  <div class="card">
    <div class="sec-title">食材進貨明細（本月 A類）</div>
    <div id="ing-detail"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════════
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const INV_SUPPLIERS = {
  A: ['廣弘','富美','喆園','豆老爺','開元','國農','雞蛋','湯圓','弘軒','其他'],
  B: ['瓦斯','甫疄','米食家','其他']
};
const FIXED_EXP_KEYS = ['rent','security','delivery_car','telecom','electricity','water'];
const FIXED_EXP_LABELS = { rent:'租金', security:'保全費', delivery_car:'子母車', telecom:'電信費', electricity:'電費', water:'水費' };

// ══════════════════════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════════════════════
const LS = {
  get: (k, d=[]) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};
let revenue   = LS.get('xh_revenue', []);
let inventory = LS.get('xh_inventory', []);
let personnel = LS.get('xh_personnel', []);
let balance   = LS.get('xh_balance', 50000);
let fixedExp  = LS.get('xh_fixed_exp', { rent:35000, security:3500, delivery_car:4800, telecom:1200, electricity:4500, water:800 });
let otherExp  = LS.get('xh_other_exp', []);

function save() {
  LS.set('xh_revenue', revenue);
  LS.set('xh_inventory', inventory);
  LS.set('xh_personnel', personnel);
  LS.set('xh_balance', balance);
  LS.set('xh_fixed_exp', fixedExp);
  LS.set('xh_other_exp', otherExp);
}

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
const pad = n => String(n).padStart(2,'0');
const today = new Date();
const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
const sumBy = (arr, k) => arr.reduce((s,r) => s + (Number(r[k])||0), 0);
const money = n => '$' + Math.abs(Math.round(n)).toLocaleString();
const pct = (n,t) => t ? ((n/t)*100).toFixed(1) : '0.0';
const growth = (cur, prv) => prv ? (((cur-prv)/prv)*100).toFixed(1) : null;
const getYM = d => d.slice(0,7);

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function getYears() {
  const ys = new Set([today.getFullYear()]);
  revenue.forEach(r => ys.add(Number(r.date.slice(0,4))));
  inventory.forEach(r => ys.add(Number(r.date.slice(0,4))));
  personnel.forEach(r => ys.add(Number(r.year)));
  return [...ys].sort((a,b)=>b-a);
}

function fillYearSelect(id, cur) {
  const el = document.getElementById(id);
  const val = el.value || cur || today.getFullYear();
  const years = getYears();
  el.innerHTML = years.map(y => `<option value="${y}"${y==val?' selected':''}>${y}年</option>`).join('');
}
function fillMonthSelect(id, cur) {
  const el = document.getElementById(id);
  const val = el.value || cur || (today.getMonth()+1);
  el.innerHTML = MONTHS.map((m,i)=>`<option value="${i+1}"${(i+1)==val?' selected':''}>${m}</option>`).join('');
}

function renderOverview() {
  const ym = todayStr.slice(0,7);
  const mRev = revenue.filter(r => r.date.startsWith(ym));
  const mInv = inventory.filter(r => r.date.startsWith(ym));
  const mPer = personnel.filter(r => r.year===today.getFullYear() && r.month===(today.getMonth()+1));
  const tRev = revenue.find(r => r.date === todayStr);
  const totalRev = sumBy(mRev,'total_amount');
  const totalInv = sumBy(mInv,'total_cost');
  const totalPer = sumBy(mPer,'total');
  const totalFixed = Object.values(fixedExp).reduce((s,v)=>s+Number(v),0);
  const totalOther = sumBy(otherExp,'amount');
  const totalExp = totalInv + totalPer + totalFixed + totalOther;
  const profit = totalRev - totalExp;
  const workDays = new Set(mRev.map(r=>r.date)).size;
  const avgDay = workDays ? Math.round(totalRev/workDays) : 0;
  const prevYM = today.getMonth()===0 ? `${today.getFullYear()-1}-12` : `${today.getFullYear()}-${pad(today.getMonth())}`;
  const prevRev = sumBy(revenue.filter(r=>r.date.startsWith(prevYM)),'total_amount');
  const gr = growth(totalRev, prevRev);
  const invPct = Number(pct(totalInv, totalRev));
  const perPct = Number(pct(totalPer, totalRev));

  const grHtml = gr !== null ? `<div><p>vs 上月</p><b style="color:${Number(gr)>=0?'#A8E8A8':'#FFAAAA'}">${Number(gr)>=0?'▲':'▼'}${Math.abs(gr)}%</b></div>` : '';

  document.getElementById('p0').innerHTML = `
    <div class="hero">
      <div class="hero-label">今日 · ${todayStr}</div>
      <div class="hero-val">${tRev ? money(tRev.total_amount) : '尚未記帳'}</div>
      ${tRev ? `<div class="hero-sub">共 ${tRev.order_count} 單</div>` : ''}
      <div class="hero-row">
        <div class="hi"><p>今日進貨</p><b>${money(sumBy(inventory.filter(r=>r.date===todayStr),'total_cost'))}</b></div>
        <div class="hi"><p>月累積營收</p><b>${money(totalRev)}</b></div>
        ${grHtml}
      </div>
    </div>
    <div class="card">
      <div class="sec-title">${ym} 本月損益概況</div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">月營業額</div><div class="kpi-val">${money(totalRev)}</div><div class="kpi-sub">${workDays} 工作日 · 均 ${money(avgDay)}</div></div>
        <div class="kpi"><div class="kpi-label">月支出合計</div><div class="kpi-val" style="color:var(--red)">${money(totalExp)}</div><div class="kpi-sub">貨款＋人事＋固定</div></div>
      </div>
      <div class="kpi-row" style="margin-top:10px">
        <div class="kpi"><div class="kpi-label">月實賺金額</div><div class="kpi-val" style="color:${profit>=0?'var(--green)':'var(--red)'}">${profit>=0?'+':'-'}${money(profit).slice(1)}</div><div class="kpi-sub">${profit>=0?'🎉 本月盈餘':'⚠ 本月虧損'}</div></div>
        <div class="kpi"><div class="kpi-label">平均日營業額</div><div class="kpi-val" style="color:var(--accent2)">${money(avgDay)}</div></div>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">成本佔比分析</div>
      ${barRow('進貨佔比', invPct, '#C4906A', true)}
      ${barRow('人事佔比', perPct, '#8A7AAB', true)}
      ${barRow('固定成本', Number(pct(totalFixed,totalRev)), '#7A9AAB', false)}
    </div>`;
}

function barRow(label, pctVal, color, showBadge) {
  const badge = showBadge ? `<span class="badge ${pctVal<=30?'badge-good':pctVal<=40?'badge-ok':'badge-bad'}">${pctVal<=30?'✓ 優良':pctVal<=40?'△ 尚可':'✗ 欠佳'}</span>` : '';
  return `<div class="bar-row">
    <div class="bar-meta">
      <span class="bar-label">${label}</span>
      <div class="bar-right">${badge}<span class="bar-pct">${pctVal}%</span></div>
    </div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.min(pctVal,100)}%;background:${color}"></div></div>
  </div>`;
}

let revView = 'day';
function initRevPage() {
  document.getElementById('rev-date').value = todayStr;
  fillYearSelect('rv-year', today.getFullYear());
  fillMonthSelect('rv-month', today.getMonth()+1);
  renderRevTable();
}
function setRevView(v, btn) {
  revView = v;
  document.querySelectorAll('#rv-d,#rv-m,#rv-y').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('rv-month').style.display = v==='day'?'':'none';
  renderRevTable();
}
function addRevenue() {
  const date = document.getElementById('rev-date').value;
  const orders = Number(document.getElementById('rev-orders').value)||0;
  const amount = Number(document.getElementById('rev-amount').value);
  const note = document.getElementById('rev-note').value.trim();
  if (!date||!amount) { toast('請填寫日期與營業額'); return; }
  const existing = revenue.findIndex(r=>r.date===date);
  if (existing>=0) { revenue[existing] = {id:revenue[existing].id,date,order_count:orders,total_amount:amount,note}; }
  else { revenue.push({id:Date.now(),date,order_count:orders,total_amount:amount,note}); }
  save(); toast('✓ 已新增紀錄'); refreshAll();
  document.getElementById('rev-orders').value='';
  document.getElementById('rev-amount').value='';
  document.getElementById('rev-note').value='';
}
function delRevenue(id) {
  if (!confirm('確定刪除？')) return;
  revenue = revenue.filter(r=>r.id!==id); save(); refreshAll();
}
function renderRevTable() {
  const yr = Number(document.getElementById('rv-year')?.value||today.getFullYear());
  const mo = Number(document.getElementById('rv-month')?.value||today.getMonth()+1);
  const wrap = document.getElementById('rev-table-wrap');
  if (!wrap) return;
  if (revView==='day') {
    const ym = `${yr}-${pad(mo)}`;
    const rows = revenue.filter(r=>r.date.startsWith(ym)).sort((a,b)=>b.date.localeCompare(a.date));
    const total = sumBy(rows,'total_amount');
    wrap.innerHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:8px">${rows.length} 筆 · 合計 <b style="color:var(--accent)">${money(total)}</b></div>
    <div class="tbl-wrap"><table>
      <tr><th>日期</th><th>單數</th><th>營業額</th><th>備註</th><th></th></tr>
      ${rows.map(r=>`<tr>
        <td style="white-space:nowrap">${r.date}</td>
        <td style="font-variant-numeric:tabular-nums">${r.order_count}</td>
        <td style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">${money(r.total_amount)}</td>
        <td style="font-size:11px;color:var(--muted)">${r.note||'—'}</td>
        <td><button class="btn-danger" onclick="delRevenue(${r.id})">刪</button></td>
      </tr>`).join('')}
    </table></div>`;
  } else if (revView==='month') {
    const map = {};
    revenue.filter(r=>r.date.startsWith(`${yr}`)).forEach(r=>{
      const m=r.date.slice(5,7); if(!map[m]) map[m]={m,days:0,orders:0,total:0};
      map[m].days++; map[m].orders+=r.order_count; map[m].total+=r.total_amount;
    });
    const rows = Object.values(map).sort((a,b)=>a.m.localeCompare(b.m));
    wrap.innerHTML = `<div class="tbl-wrap"><table>
      <tr><th>月份</th><th>工作天</th><th>單數</th><th>月營業額</th><th>均日</th></tr>
      ${rows.map(r=>`<tr>
        <td>${r.m}月</td><td>${r.days}天</td>
        <td style="font-variant-numeric:tabular-nums">${r.orders}</td>
        <td style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">${money(r.total)}</td>
        <td style="font-variant-numeric:tabular-nums;color:var(--muted)">${money(Math.round(r.total/r.days))}</td>
      </tr>`).join('')}
      <tr style="background:var(--card2)"><td><b>合計</b></td><td></td><td></td><td style="font-weight:900;color:var(--accent)">${money(sumBy(rows,'total'))}</td><td></td></tr>
    </table></div>`;
  } else {
    const years = getYears();
    wrap.innerHTML = years.map(y=>{
      const yData = revenue.filter(r=>r.date.startsWith(`${y}`));
      return `<div style="padding:12px;background:var(--bg);border-radius:10px;border:1px solid var(--border);margin-bottom:8px">
        <div style="font-weight:700;color:var(--accent)">${y} 年</div>
        <div style="font-size:12px;color:var(--muted)">共 ${yData.length} 個工作天 · 年營業額 <b style="color:var(--text);font-variant-numeric:tabular-nums">${money(sumBy(yData,'total_amount'))}</b></div>
      </div>`;
    }).join('');
  }
}

//  PAGE 4: MONTHLY P&L
// ══════════════════════════════════════════════════════════
function initPLPage() {
  fillYearSelect('pl-year', today.getFullYear());
  fillMonthSelect('pl-month', today.getMonth()+1);
  renderPL();
}
function getMonthStat(y, m) {
  const ym = `${y}-${pad(m)}`;
  const mRev = revenue.filter(r=>r.date.startsWith(ym));
  const mInv = inventory.filter(r=>r.date.startsWith(ym));
  const mPer = personnel.filter(r=>r.year===Number(y)&&r.month===Number(m));
  const totalRev = sumBy(mRev,'total_amount');
  const totalInv = sumBy(mInv,'total_cost');
  const totalPer = sumBy(mPer,'total');
  const totalFixed = Object.values(fixedExp).reduce((s,v)=>s+Number(v),0);
  const totalOther = sumBy(otherExp,'amount');
  const profit = totalRev - totalInv - totalPer - totalFixed - totalOther;
  const days = new Set(mRev.map(r=>r.date)).size;
  return { totalRev, totalInv, totalPer, totalFixed, totalOther, profit, days, orders: sumBy(mRev,'order_count') };
}
function renderPL() {
  const yr = Number(document.getElementById('pl-year')?.value||today.getFullYear());
  const mo = Number(document.getElementById('pl-month')?.value||today.getMonth()+1);
  const s = getMonthStat(yr, mo);
  const invPct = Number(pct(s.totalInv, s.totalRev));
  const perPct = Number(pct(s.totalPer, s.totalRev));
  const avgDay = s.days ? Math.round(s.totalRev/s.days) : 0;
  const totalExp = s.totalInv + s.totalPer + s.totalFixed + s.totalOther;

  let fixedRows = FIXED_EXP_KEYS.map(k => `
    <div class="exp-row">
      <span class="exp-name">${FIXED_EXP_LABELS[k]}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="number" value="${fixedExp[k]||0}" style="width:90px;padding:5px 8px;font-size:12px;text-align:right" onchange="fixedExp['${k}']=Number(this.value);save();renderPL()">
      </div>
    </div>`).join('');

  let otherRows = otherExp.map(o => `
    <div class="exp-row">
      <span class="exp-name">${o.label}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="exp-val" style="color:var(--red)">${money(o.amount)}</span>
        <button class="btn-danger" onclick="delOtherExp(${o.id})">刪</button>
      </div>
    </div>`).join('');

  document.getElementById('pl-content').innerHTML = `
    <div class="pl-result ${s.profit>=0?'positive':'negative'}">
      <div class="pl-label">${yr}/${pad(mo)} · 損益結算</div>
      <div class="pl-val" style="color:${s.profit>=0?'var(--green)':'var(--red)'}">${s.profit>=0?'+':'-'}${money(s.profit).slice(1)}</div>
      <div class="pl-sub">${s.profit>=0?'🎉 本月盈餘':'⚠ 本月虧損'} · ${s.days} 個工作日 · 均日 ${money(avgDay)}</div>
    </div>
    <div class="card">
      <div class="sec-title">收支明細</div>
      <div class="exp-row"><span class="exp-name" style="font-weight:700">總營業額</span><span class="exp-val" style="color:var(--green)">${money(s.totalRev)}</span></div>
      <div class="exp-row"><span class="exp-name">貨款（進貨）</span><span class="exp-val" style="color:var(--red)">-${money(s.totalInv).slice(1)}</span></div>
      <div class="exp-row"><span class="exp-name">人事薪資</span><span class="exp-val" style="color:var(--red)">-${money(s.totalPer).slice(1)}</span></div>
      ${FIXED_EXP_KEYS.map(k=>`<div class="exp-row"><span class="exp-name">${FIXED_EXP_LABELS[k]}</span><span class="exp-val" style="color:var(--red)">-${money(fixedExp[k]||0).slice(1)}</span></div>`).join('')}
      ${otherExp.map(o=>`<div class="exp-row"><span class="exp-name">${o.label}</span><span class="exp-val" style="color:var(--red)">-${money(o.amount).slice(1)}</span></div>`).join('')}
      <div class="exp-row" style="border-top:2px solid var(--border);padding-top:10px">
        <span style="font-weight:900">實賺金額</span>
        <span style="font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;color:${s.profit>=0?'var(--green)':'var(--red)'}">${s.profit>=0?'+':'-'}${money(s.profit).slice(1)}</span>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">固定支出設定</div>
      ${fixedRows}
    </div>
    <div class="card">
      <div class="sec-title">其他支出項目</div>
      ${otherRows}
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <input type="text" id="other-label" placeholder="項目名稱" style="flex:1;min-width:100px">
        <input type="number" id="other-amount" placeholder="金額" style="flex:1;min-width:80px">
        <button class="btn-primary" onclick="addOtherExp()">＋</button>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">成本佔比分析</div>
      ${barRow('進貨佔比', invPct, '#C4906A', true)}
      <p style="font-size:11px;color:${invPct<=30?'var(--green)':invPct<=40?'var(--yellow)':'var(--red)'};margin-bottom:12px">
        ${invPct<=30?'✓ 優良 — 食材成本控管良好':invPct<=40?'△ 尚可 — 建議適度控制進貨':'✗ 欠佳 — 食材成本偏高，請檢視採購'}
      </p>
      ${barRow('人事佔比', perPct, '#8A7AAB', true)}
      <p style="font-size:11px;color:${perPct<=30?'var(--green)':perPct<=40?'var(--yellow)':'var(--red)'}">
        ${perPct<=30?'✓ 優良 — 人事成本控管良好':perPct<=40?'△ 尚可 — 可留意排班效率':'✗ 欠佳 — 人事成本偏高，請檢視排班'}
      </p>
    </div>`;
}
function addOtherExp() {
  const label = document.getElementById('other-label')?.value.trim();
  const amount = Number(document.getElementById('other-amount')?.value);
  if (!label||!amount) { toast('請填寫項目名稱與金額'); return; }
  otherExp.push({id:Date.now(),label,amount}); save(); renderPL();
}
function delOtherExp(id) {
  otherExp = otherExp.filter(o=>o.id!==id); save(); renderPL();
}

// ══════════════════════════════════════════════════════════
//  PAGE 5: ANNUAL
// ══════════════════════════════════════════════════════════
function initYrPage() {
  renderYrControls();
  renderYrContent();
}
function setYrView(v, btn) {
  yrView = v;
  document.querySelectorAll('#yr-tab-monthly,#yr-tab-compare,#yr-tab-yoy').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderYrControls();
  renderYrContent();
}
function renderYrControls() {
  const wrap = document.getElementById('yr-controls');
  const years = getYears();
  if (yrView==='monthly') {
    wrap.innerHTML = `<select id="yr-year-a" onchange="renderYrContent()" style="width:auto;padding:7px 10px;font-size:13px">
      ${years.map(y=>`<option${y===today.getFullYear()?' selected':''}>${y}</option>`).join('')}</select>`;
  } else if (yrView==='compare') {
    wrap.innerHTML = `<select id="yr-year-a" onchange="renderYrContent()" style="width:auto;padding:7px 10px;font-size:13px">
      ${years.map(y=>`<option${y===today.getFullYear()?' selected':''}>${y}</option>`).join('')}</select>
    <select id="yr-month-a" onchange="renderYrContent()" style="width:auto;padding:7px 10px;font-size:13px">
      ${MONTHS.map((m,i)=>`<option value="${i+1}"${(i+1)===today.getMonth()+1?' selected':''}>${m}</option>`).join('')}</select>`;
  } else {
    const yr2 = years.length>1?years[1]:years[0];
    wrap.innerHTML = `<select id="yr-year-a" onchange="renderYrContent()" style="width:auto;padding:7px 10px;font-size:13px">
      ${years.map(y=>`<option${y===today.getFullYear()?' selected':''}>${y}</option>`).join('')}</select>
    <span style="line-height:34px;color:var(--muted);font-size:13px">vs</span>
    <select id="yr-year-b" onchange="renderYrContent()" style="width:auto;padding:7px 10px;font-size:13px">
      ${years.map(y=>`<option${y===yr2?' selected':''}>${y}</option>`).join('')}</select>`;
  }
}
function renderYrContent() {
  const wrap = document.getElementById('yr-content');
  const yA = Number(document.getElementById('yr-year-a')?.value||today.getFullYear());

  if (yrView==='monthly') {
    const stats = MONTHS.map((_,i)=>({month:i+1,...getMonthStat(yA,i+1)}));
    const yTotal = sumBy(stats,'totalRev');
    wrap.innerHTML = `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="sec-title" style="margin:0">${yA} 年 1–12月</div>
        <b style="color:var(--accent);font-variant-numeric:tabular-nums">${money(yTotal)}</b>
      </div>
      <div class="month-grid">${stats.map((s,i)=>{
        const prev = i>0?stats[i-1]:null;
        const gr = prev&&prev.totalRev?growth(s.totalRev,prev.totalRev):null;
        return `<div class="month-cell" onclick="setYrView('compare',document.getElementById('yr-tab-compare'));document.getElementById('yr-month-a') && (document.getElementById('yr-month-a').value=${s.month});renderYrContent()">
          <div class="mc-name">${MONTHS[i]}</div>
          <div class="mc-val">${s.totalRev?money(s.totalRev):'—'}</div>
          <div class="mc-gr" style="color:${gr===null?'var(--muted)':Number(gr)>=0?'var(--green)':'var(--red)'}">${gr!==null?(Number(gr)>=0?'▲':'▼')+Math.abs(gr)+'%':'—'}</div>
        </div>`;
      }).join('')}</div>
      <div class="tbl-wrap" style="margin-top:16px"><table>
        <tr><th>月</th><th>工作天</th><th>月營收</th><th>月損益</th><th>vs上月</th></tr>
        ${stats.map((s,i)=>{
          const prev = i>0?stats[i-1]:null;
          const gr = prev&&prev.totalRev?growth(s.totalRev,prev.totalRev):null;
          return `<tr>
            <td><b>${MONTHS[i]}</b></td>
            <td style="color:var(--muted)">${s.days||'—'}</td>
            <td style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">${s.totalRev?money(s.totalRev):'—'}</td>
            <td style="font-weight:700;font-variant-numeric:tabular-nums;color:${s.profit>=0?'var(--green)':'var(--red)'}">${s.totalRev?(s.profit>=0?'+':'-')+money(s.profit).slice(1):'—'}</td>
            <td style="font-variant-numeric:tabular-nums;color:${gr===null?'var(--muted)':Number(gr)>=0?'var(--green)':'var(--red)'};font-size:12px">${gr!==null?(Number(gr)>=0?'▲':'▼')+Math.abs(gr)+'%':'—'}</td>
          </tr>`;
        }).join('')}
      </table></div>
    </div>`;

  } else if (yrView==='compare') {
    const mo = Number(document.getElementById('yr-month-a')?.value||today.getMonth()+1);
    const cur = getMonthStat(yA, mo);
    const prevM = mo===1 ? {totalRev:0,profit:0} : getMonthStat(yA, mo-1);
    const prevY = getMonthStat(yA-1, mo);
    const grMoM = growth(cur.totalRev, prevM.totalRev);
    const grYoY = growth(cur.totalRev, prevY.totalRev);
    wrap.innerHTML = `
      <div class="card">
        <div class="sec-title">${yA}/${pad(mo)} 本月詳情</div>
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-label">月營業額</div><div class="kpi-val">${money(cur.totalRev)}</div><div class="kpi-sub">${cur.days} 工作日</div></div>
          <div class="kpi"><div class="kpi-label">月損益</div><div class="kpi-val" style="color:${cur.profit>=0?'var(--green)':'var(--red)'}">${cur.profit>=0?'+':'-'}${money(cur.profit).slice(1)}</div></div>
        </div>
      </div>
      <div class="card">
        <div class="sec-title">成長率比較</div>
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-label">vs 上月</div>
            <div class="kpi-val" style="color:${grMoM&&Number(grMoM)>=0?'var(--green)':'var(--red)'}">${grMoM!==null?(Number(grMoM)>=0?'▲':'▼')+Math.abs(grMoM)+'%':'—'}</div>
            <div class="kpi-sub">上月 ${money(prevM.totalRev)}</div></div>
          <div class="kpi"><div class="kpi-label">vs ${yA-1}年同月</div>
            <div class="kpi-val" style="color:${grYoY&&Number(grYoY)>=0?'var(--green)':'var(--red)'}">${grYoY!==null?(Number(grYoY)>=0?'▲':'▼')+Math.abs(grYoY)+'%':'—'}</div>
            <div class="kpi-sub">去年 ${money(prevY.totalRev)}</div></div>
        </div>
        <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
          ${[['本月',cur.totalRev,'var(--accent)'],['上月',prevM.totalRev,'var(--muted)'],['差額',cur.totalRev-prevM.totalRev,cur.totalRev>=prevM.totalRev?'var(--green)':'var(--red)']].map(([l,v,c])=>`
            <div style="background:var(--bg);border-radius:8px;border:1px solid var(--border);padding:10px 6px">
              <div style="font-size:10px;color:var(--muted)">${l}</div>
              <div style="font-size:13px;font-weight:700;color:${c};font-variant-numeric:tabular-nums">${l==='差額'&&v>0?'+':''}${money(v)}</div>
            </div>`).join('')}
        </div>
      </div>`;

  } else { // yoy
    const yB = Number(document.getElementById('yr-year-b')?.value||yA-1);
    const aStats = MONTHS.map((_,i)=>({month:i+1,...getMonthStat(yA,i+1)}));
    const bStats = MONTHS.map((_,i)=>({month:i+1,...getMonthStat(yB,i+1)}));
    const aTot = sumBy(aStats,'totalRev');
    const bTot = sumBy(bStats,'totalRev');
    const gr = growth(aTot, bTot);
    wrap.innerHTML = `<div class="card">
      <div class="kpi-row" style="margin-bottom:12px">
        <div class="kpi"><div class="kpi-label">${yA} 年總營收</div><div class="kpi-val">${money(aTot)}</div></div>
        <div class="kpi"><div class="kpi-label">${yB} 年總營收</div><div class="kpi-val" style="color:var(--muted)">${money(bTot)}</div></div>
      </div>
      ${bTot>0?`<div style="padding:12px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border);margin-bottom:14px">
        <div style="font-size:10px;color:var(--muted)">年度成長率（${yB}→${yA}）</div>
        <div style="font-size:24px;font-weight:900;font-variant-numeric:tabular-nums;color:${aTot>=bTot?'var(--green)':'var(--red)'}">${aTot>=bTot?'▲':'▼'}${Math.abs(gr)}%</div>
      </div>`:''}
      <div class="sec-title">逐月對比</div>
      <div class="tbl-wrap"><table>
        <tr><th>月份</th><th>${yA}營收</th><th>${yB}營收</th><th>增減</th></tr>
        ${aStats.map((a,i)=>{
          const b=bStats[i];
          const gr=growth(a.totalRev,b.totalRev);
          return `<tr>
            <td><b>${MONTHS[i]}</b></td>
            <td style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">${a.totalRev?money(a.totalRev):'—'}</td>
            <td style="color:var(--muted);font-variant-numeric:tabular-nums">${b.totalRev?money(b.totalRev):'—'}</td>
            <td style="font-variant-numeric:tabular-nums;color:${gr===null?'var(--muted)':Number(gr)>=0?'var(--green)':'var(--red)'};font-size:12px">${gr!==null?(Number(gr)>=0?'▲':'▼')+Math.abs(gr)+'%':'—'}</td>
          </tr>`;
        }).join('')}
      </table></div>
    </div>`;
  }
}

// ══════════════════════════════════════════════════════════
//  PAGE 6: INGREDIENTS
// ══════════════════════════════════════════════════════════
function initIngPage() {
  fillYearSelect('ing-year', today.getFullYear());
  fillMonthSelect('ing-month', today.getMonth()+1);
  renderIngredients();
}
function renderIngredients() {
  const yr = Number(document.getElementById('ing-year')?.value||today.getFullYear());
  const mo = Number(document.getElementById('ing-month')?.value||today.getMonth()+1);
  const ym = `${yr}-${pad(mo)}`;
  const lastStock = Number(document.getElementById('ing-last-stock')?.value)||0;
  const curStock = Number(document.getElementById('ing-cur-stock')?.value)||0;
  const mInvA = inventory.filter(r=>r.date.startsWith(ym)&&r.cat==='A');
  const mInvAll = inventory.filter(r=>r.date.startsWith(ym));
  const totalPurchaseA = sumBy(mInvA,'total_cost');
  const totalPurchaseAll = sumBy(mInvAll,'total_cost');
  // 公式：本月進貨 + 上月剩餘 - 本月底剩餘 = 本月實際消耗
  const actualCost = totalPurchaseA + lastStock - curStock;

  document.getElementById('ing-result').innerHTML = `
    <div class="card">
      <div class="sec-title">食材成本計算</div>
      <div class="exp-row"><span class="exp-name">本月食材進貨（A類）</span><span class="exp-val" style="color:var(--accent)">${money(totalPurchaseA)}</span></div>
      <div class="exp-row"><span class="exp-name">＋ 上月剩餘庫存</span><span class="exp-val">${money(lastStock)}</span></div>
      <div class="exp-row"><span class="exp-name">－ 本月底剩餘庫存</span><span class="exp-val" style="color:var(--red)">-${money(curStock).slice(1)}</span></div>
      <div class="exp-row" style="border-top:2px solid var(--border);padding-top:10px">
        <span style="font-weight:900">＝ 本月實際消耗成本</span>
        <span style="font-size:20px;font-weight:900;color:var(--red);font-variant-numeric:tabular-nums">${money(actualCost)}</span>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">總叫貨概況 ${ym}</div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">食材叫貨（A）</div><div class="kpi-val" style="color:var(--accent)">${money(totalPurchaseA)}</div><div class="kpi-sub">${mInvA.length} 筆</div></div>
        <div class="kpi"><div class="kpi-label">全部進貨合計</div><div class="kpi-val" style="color:var(--red)">${money(totalPurchaseAll)}</div><div class="kpi-sub">${mInvAll.length} 筆</div></div>
      </div>
    </div>`;

  // detail table
  const supMap = {};
  mInvA.forEach(r=>{
    if(!supMap[r.supplier]) supMap[r.supplier]={sup:r.supplier,total:0,count:0};
    supMap[r.supplier].total+=r.total_cost;
    supMap[r.supplier].count++;
  });
  const supRows = Object.values(supMap).sort((a,b)=>b.total-a.total);
  document.getElementById('ing-detail').innerHTML = `
    <div class="tbl-wrap"><table>
      <tr><th>廠商</th><th>筆數</th><th>合計金額</th></tr>
      ${supRows.map(r=>`<tr>
        <td>${r.sup}</td><td style="color:var(--muted)">${r.count}筆</td>
        <td style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">${money(r.total)}</td>
      </tr>`).join('')}
      ${supRows.length?`<tr style="background:var(--card2)"><td><b>合計</b></td><td></td><td style="font-weight:900;color:var(--accent)">${money(totalPurchaseA)}</td></tr>`:'<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:20px">本月尚無食材進貨紀錄</td></tr>'}
    </table></div>`;
}

document.addEventListener('DOMContentLoaded', () => {
  refreshAll();
