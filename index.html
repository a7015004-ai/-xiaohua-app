<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="小花食堂">
<title>🌸 小花食堂 · 旗艦營運系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ─── CSS 變數 ─────────────────────────────────────── */
:root {
  --bg:      #F5EDE0;
  --card:    #FDF8F2;
  --card2:   #F9F0E3;
  --border:  #E2C9A8;
  --accent:  #9E7248;
  --accent2: #C49568;
  --text:    #3A2410;
  --muted:   #8B6040;
  --green:   #4F7942;
  --red:     #9B3A3A;
  --yellow:  #7A6518;
  --shadow:  0 2px 12px rgba(120,80,40,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 15px; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 50px; }

/* ─── TOP BAR ─────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
  box-shadow: var(--shadow);
}
#topbar h1 { font-size: 18px; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; }
#topbar .date { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }

/* ─── NAV ─────────────────────────────────────────── */
#nav {
  background: var(--card); border-bottom: 1px solid var(--border);
  display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; gap: 0; padding: 0 8px; position: sticky; top: 60px; z-index: 90;
}
#nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex-shrink: 0; border: none; background: transparent;
  padding: 12px 15px; font-size: 12px; font-weight: 700;
  color: var(--muted); cursor: pointer; font-family: inherit;
  border-bottom: 3px solid transparent; white-space: nowrap;
}
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ─── PAGES ───────────────────────────────────────── */
.page { display: none; padding: 14px 14px 40px; max-width: 640px; margin: 0 auto; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* ─── CARDS ───────────────────────────────────────── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.sec-title {
  font-size: 10px; font-weight: 800; color: var(--muted);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px;
}

/* ─── KPI ─────────────────────────────────────────── */
.kpi-row { display: flex; gap: 10px; flex-wrap: wrap; }
.kpi {
  flex: 1; min-width: 130px; background: var(--card2);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
}
.kpi .kpi-label { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: .06em; margin-bottom: 4px; }
.kpi .kpi-val   { font-size: 20px; font-weight: 900; font-variant-numeric: tabular-nums; color: var(--accent); line-height: 1.1; }
.kpi .kpi-sub   { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ─── HERO ────────────────────────────────────────── */
.hero { background: var(--accent); border-radius: 16px; padding: 18px; margin-bottom: 14px; color: #FDF8F2; }
.hero .hero-label { font-size: 11px; opacity: .75; margin-bottom: 4px; }
.hero .hero-val   { font-size: 32px; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; }
.hero .hero-sub   { font-size: 12px; opacity: .7; margin-top: 6px; }
.hero-row { display: flex; gap: 20px; margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.2); }
.hero-row .hi p { font-size: 10px; opacity: .7; }
.hero-row .hi b { font-size: 14px; font-variant-numeric: tabular-nums; }

/* ─── FORMS ───────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field label { display: block; font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .06em; margin-bottom: 4px; }
input, select, textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 11px; color: var(--text);
  font-size: 13px; font-family: inherit; outline: none;
}
.btn-primary {
  background: var(--accent); color: var(--card); border: none;
  border-radius: 9px; padding: 10px 18px; font-weight: 700;
  font-size: 13px; cursor: pointer; transition: opacity .2s;
}
.btn-sm {
  background: var(--bg); color: var(--muted); border: 1px solid var(--border);
  border-radius: 7px; padding: 6px 11px; font-size: 11px; font-weight: 700; cursor: pointer;
}
.btn-sm.active { background: var(--accent); color: var(--card); border-color: var(--accent); }
.btn-danger {
  background: #FEF0F0; color: var(--red); border: 1px solid #E8BEBE;
  border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
}

/* ─── TABLES ──────────────────────────────────────── */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; min-width: 380px; background: var(--card); }
th { padding: 10px; font-size: 10px; font-weight: 800; color: var(--muted); text-align: left; border-bottom: 1px solid var(--border); background: var(--card2); }
td { padding: 10px; font-size: 13px; color: var(--text); border-bottom: 1px solid var(--border); }

/* ─── BAR CHART ───────────────────────────────────── */
.bar-row { margin-bottom: 12px; }
.bar-meta { display: flex; justify-content: space-between; margin-bottom: 4px; }
.bar-pct { font-size: 12px; font-variant-numeric: tabular-nums; color: var(--muted); font-weight: 700; }
.bar-track { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; border: 1px solid var(--border); }
.bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }

/* ─── BADGE ───────────────────────────────────────── */
.badge { border-radius: 6px; padding: 2px 8px; font-size: 10px; font-weight: 800; display: inline-block; }
.badge-good { background: #EBF5EB; color: var(--green); border: 1px solid #BAD8BA; }
.badge-ok   { background: #FEF9E0; color: var(--yellow); border: 1px solid #E8D898; }
.badge-bad  { background: #FEF0F0; color: var(--red); border: 1px solid #E8BEBE; }

/* ─── MISC ────────────────────────────────────────── */
.month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.month-cell { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 10px; text-align: center; cursor: pointer; }
.month-cell .mc-val { font-size: 12px; font-weight: 700; color: var(--accent); margin-top: 2px; }

.exp-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.exp-row:last-child { border-bottom: none; }

#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--card); border-radius: 20px;
  padding: 10px 20px; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 999;
}
#toast.show { opacity: 1; }

@media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="topbar">
  <div>
    <h1>🌸 小花食堂</h1>
    <div class="date" id="today-display"></div>
  </div>
  <div style="text-align:right">
    <div style="font-size:10px;color:var(--muted)">今日營收</div>
    <div style="font-size:16px;font-weight:900;color:var(--accent)" id="header-today-rev">—</div>
  </div>
</div>

<div id="nav">
  <button class="nav-btn active" onclick="showPage('p0',this)">📊 總覽</button>
  <button class="nav-btn" onclick="showPage('p1',this)">📋 記帳</button>
  <button class="nav-btn" onclick="showPage('p2',this)">📦 進貨</button>
  <button class="nav-btn" onclick="showPage('p3',this)">👥 人事</button>
  <button class="nav-btn" onclick="showPage('p4',this)">📅 損益</button>
  <button class="nav-btn" onclick="showPage('p5',this)">📈 年度</button>
  <button class="nav-btn" onclick="showPage('p6',this)">🥬 食材</button>
</div>

<div class="page active" id="p0">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <select id="ov-year" onchange="renderOverview()"></select>
    <select id="ov-month" onchange="renderOverview()"></select>
  </div>
  <div id="ov-content"></div>
</div>

<div class="page" id="p1">
  <div class="card">
    <div class="sec-title">新增營業額</div>
    <div class="form-grid">
      <div class="field"><label>日期</label><input type="date" id="rev-date"></div>
      <div class="field"><label>單數</label><input type="number" id="rev-orders"></div>
      <div class="field"><label>營收（元）</label><input type="number" id="rev-amount"></div>
      <div class="field"><label>備註</label><input type="text" id="rev-note"></div>
    </div>
    <button class="btn-primary" style="margin-top:12px" onclick="addRevenue()">＋ 儲存紀錄</button>
  </div>
  <div class="card">
    <div style="display:flex; gap:6px; margin-bottom:12px">
        <button class="btn-sm active" id="rv-btn-d" onclick="setRevView('day',this)">日</button>
        <button class="btn-sm" id="rv-btn-m" onclick="setRevView('month',this)">月</button>
        <select id="rv-year" onchange="renderRevTable()" style="flex:1"></select>
    </div>
    <div id="rev-table-wrap"></div>
  </div>
</div>

<div class="page" id="p2">
  <div class="card">
    <div class="sec-title">帳上餘額</div>
    <div style="display:flex; gap:10px; align-items:center">
      <div class="kpi" style="flex:1"><div class="kpi-val" id="inv-balance-val">$0</div></div>
      <input type="number" id="topup-amount" placeholder="儲值" style="width:80px">
      <button class="btn-primary" onclick="doTopUp()">儲值</button>
    </div>
  </div>
  <div class="card">
    <div class="sec-title">新增進貨</div>
    <div class="form-grid">
      <div class="field"><label>日期</label><input type="date" id="inv-date"></div>
      <div class="field"><label>類別</label><select id="inv-cat" onchange="updateInvSuppliers()"><option value="A">A 食材</option><option value="B">B 耗材</option></select></div>
      <div class="field"><label>廠商</label><select id="inv-supplier"></select></div>
      <div class="field"><label>品名</label><input type="text" id="inv-item"></div>
      <div class="field"><label>單價/數量</label>
        <div style="display:flex;gap:5px"><input type="number" id="inv-uprice" placeholder="單價" oninput="calcInvTotal()"><input type="number" id="inv-qty" placeholder="量" oninput="calcInvTotal()"></div>
      </div>
      <div class="field"><label>小計</label><input type="number" id="inv-total" readonly></div>
    </div>
    <button class="btn-primary" style="margin-top:12px" onclick="addInventory()">＋ 新增進貨</button>
  </div>
  <div class="card"><div class="sec-title">本月進貨明細</div><div id="inv-table-wrap"></div></div>
</div>

<div class="page" id="p3">
  <div class="card">
    <div class="sec-title">新增人員薪資</div>
    <div class="form-grid">
      <div class="field"><label>月份</label>
        <div style="display:flex;gap:5px"><select id="per-year"></select><select id="per-month"></select></div>
      </div>
      <div class="field"><label>姓名</label><input type="text" id="per-name"></div>
      <div class="field"><label>時薪</label><input type="number" id="per-rate" placeholder="183" oninput="calcPerTotal()"></div>
      <div class="field"><label>時數/獎金</label>
        <div style="display:flex;gap:5px"><input type="number" id="per-hours" placeholder="時數" oninput="calcPerTotal()"><input type="number" id="per-bonus" placeholder="獎金" oninput="calcPerTotal()"></div>
      </div>
    </div>
    <div style="margin-top:10px; font-weight:900; color:var(--accent)">預估薪資: <span id="per-preview">$0</span></div>
    <button class="btn-primary" style="margin-top:12px" onclick="addPersonnel()">＋ 儲存薪資</button>
  </div>
  <div class="card"><div class="sec-title" id="per-table-title">本月薪資表</div><div id="per-table-wrap"></div></div>
</div>

<div class="page" id="p4">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <select id="pl-year" onchange="renderPL()"></select>
    <select id="pl-month" onchange="renderPL()"></select>
  </div>
  <div id="pl-content"></div>
</div>

<div class="page" id="p5">
  <div class="card">
    <div class="sec-title">年度分析模式</div>
    <div style="display:flex;gap:8px;margin-bottom:15px">
        <button class="btn-sm active" id="yr-btn-m" onclick="setYrView('monthly',this)">月度總覽</button>
        <button class="btn-sm" id="yr-btn-c" onclick="setYrView('compare',this)">月份比較</button>
    </div>
    <div id="yr-controls" style="margin-bottom:15px"></div>
    <div id="yr-content"></div>
  </div>
</div>

<div class="page" id="p6">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <select id="ing-year" onchange="renderIngredients()"></select>
    <select id="ing-month" onchange="renderIngredients()"></select>
  </div>
  <div class="card">
    <div class="sec-title">庫存盤點 (每月月底填寫)</div>
    <div class="form-grid">
      <div class="field"><label>上月底剩餘 ($)</label><input type="number" id="ing-last-stock" oninput="renderIngredients()"></div>
      <div class="field"><label>本月底剩餘 ($)</label><input type="number" id="ing-cur-stock" oninput="renderIngredients()"></div>
    </div>
  </div>
  <div id="ing-result"></div>
</div>

<div id="toast"></div>

<script>
// --- 資料庫 ---
const LS = {
  get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

let revenue   = LS.get('xh_rev', []);
let inventory = LS.get('xh_inv', []);
let personnel = LS.get('xh_per', []);
let monthExp  = LS.get('xh_mexp', {});
let balance   = LS.get('xh_bal', 50000);

const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const INV_SUP = { A:['廣弘','富美','喆園','豆老爺','開元','國農','雞蛋','湯圓','弘軒','其他'], B:['瓦斯','甫疄','米食家','其他'] };
const PRESET_EXP = ['租金','中興保全','子母車','中華電信','台電','水費','其他'];

// --- 工具 ---
const pad = n => String(n).padStart(2,'0');
const money = n => '$' + Math.abs(Math.round(n)).toLocaleString();
const pct = (n, t) => t ? ((n / t) * 100).toFixed(1) : '0.0';
const today = new Date();
const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

function save() {
  LS.set('xh_rev', revenue); LS.set('xh_inv', inventory);
  LS.set('xh_per', personnel); LS.set('xh_bal', balance);
  LS.set('xh_mexp', monthExp);
}

function toast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function initSelects() {
  const ys = [today.getFullYear(), today.getFullYear()-1];
  ['ov-year','rv-year','per-year','pl-year','ing-year'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.innerHTML = ys.map(y => `<option value="${y}">${y}年</option>`).join('');
  });
  ['ov-month','per-month','pl-month','ing-month'].forEach(id => {
    const el = document.getElementById(id);
    if(el) {
      el.innerHTML = MONTHS.map((m,i) => `<option value="${i+1}" ${i+1===today.getMonth()+1?'selected':''}>${m}</option>`).join('');
    }
  });
}

// --- 導航 ---
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  refreshAll();
}

// --- 邏輯：營收 ---
function addRevenue() {
  const d = document.getElementById('rev-date').value;
  const o = Number(document.getElementById('rev-orders').value);
  const a = Number(document.getElementById('rev-amount').value);
  const n = document.getElementById('rev-note').value;
  if(!d || !a) return toast('請填寫日期與營收');
  revenue = revenue.filter(x => x.date !== d);
  revenue.push({ id:Date.now(), date:d, order_count:o, total_amount:a, note:n });
  save(); toast('✓ 已儲存'); refreshAll();
}

let revView = 'day';
function setRevView(v, btn) {
  revView = v;
  document.getElementById('rv-btn-d').classList.toggle('active', v==='day');
  document.getElementById('rv-btn-m').classList.toggle('active', v==='month');
  renderRevTable();
}

function renderRevTable() {
  const y = document.getElementById('rv-year').value;
  const wrap = document.getElementById('rev-table-wrap');
  let html = '';
  if(revView === 'day') {
    const rows = revenue.filter(r => r.date.startsWith(y)).sort((a,b)=>b.date.localeCompare(a.date));
    html = `<div class="tbl-wrap"><table><tr><th>日期</th><th>營收</th><th>單</th><th></th></tr>` +
           rows.map(r => `<tr><td>${r.date.slice(5)}</td><td style="font-weight:700">${money(r.total_amount)}</td><td>${r.order_count}</td><td><button class="btn-danger" onclick="delRev(${r.id})">刪</button></td></tr>`).join('') + `</table></div>`;
  } else {
    const mData = Array(12).fill(0).map((_,i)=>({m:i+1, total:0, days:0}));
    revenue.filter(r => r.date.startsWith(y)).forEach(r => {
      const m = parseInt(r.date.split('-')[1]);
      mData[m-1].total += r.total_amount; mData[m-1].days++;
    });
    html = `<div class="tbl-wrap"><table><tr><th>月份</th><th>總營收</th><th>日均</th></tr>` +
           mData.map(d => `<tr><td>${d.m}月</td><td>${money(d.total)}</td><td>${d.days?money(d.total/d.days):'-'}</td></tr>`).join('') + `</table></div>`;
  }
  wrap.innerHTML = html;
}

function delRev(id) { if(confirm('刪除？')) { revenue=revenue.filter(x=>x.id!==id); save(); refreshAll(); } }

// --- 邏輯：進貨 ---
function updateInvSuppliers() {
  const c = document.getElementById('inv-cat').value;
  document.getElementById('inv-supplier').innerHTML = INV_SUP[c].map(s => `<option>${s}</option>`).join('');
}
function calcInvTotal() {
  const p = document.getElementById('inv-uprice').value;
  const q = document.getElementById('inv-qty').value;
  document.getElementById('inv-total').value = (p * q) || 0;
}
function doTopUp() {
  const a = Number(document.getElementById('topup-amount').value);
  if(!a) return; balance += a; save(); toast('儲值成功'); refreshAll();
}
function addInventory() {
  const d = document.getElementById('inv-date').value;
  const c = document.getElementById('inv-cat').value;
  const s = document.getElementById('inv-supplier').value;
  const i = document.getElementById('inv-item').value;
  const t = Number(document.getElementById('inv-total').value);
  if(!d || !i || !t) return toast('請填寫完整');
  balance -= t;
  inventory.push({ id:Date.now(), date:d, cat:c, supplier:s, item:i, total:t, bal:balance });
  save(); toast('✓ 已進貨'); refreshAll();
}
function renderInvTable() {
  const m = todayStr.slice(0,7);
  const rows = inventory.filter(x => x.date.startsWith(m)).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('inv-balance-val').textContent = money(balance);
  document.getElementById('inv-table-wrap').innerHTML = `<div class="tbl-wrap"><table><tr><th>日期</th><th>品項</th><th>金額</th><th></th></tr>` +
    rows.map(r => `<tr><td>${r.date.slice(5)}</td><td>${r.item} <small>(${r.cat})</small></td><td style="color:var(--red)">-${money(r.total).slice(1)}</td><td><button class="btn-danger" onclick="delInv(${r.id})">刪</button></td></tr>`).join('') + `</table></div>`;
}
function delInv(id) {
    const item = inventory.find(x=>x.id===id);
    if(item && confirm('刪除並退還餘額？')) { balance += item.total; inventory=inventory.filter(x=>x.id!==id); save(); refreshAll(); }
}

// --- 邏輯：人事 ---
function calcPerTotal() {
  const r = document.getElementById('per-rate').value || 183;
  const h = document.getElementById('per-hours').value || 0;
  const b = Number(document.getElementById('per-bonus').value) || 0;
  document.getElementById('per-preview').textContent = money(r * h + b);
}
function addPersonnel() {
  const y = Number(document.getElementById('per-year').value);
  const m = Number(document.getElementById('per-month').value);
  const n = document.getElementById('per-name').value;
  const r = Number(document.getElementById('per-rate').value) || 183;
  const h = Number(document.getElementById('per-hours').value);
  const b = Number(document.getElementById('per-bonus').value) || 0;
  if(!n || !h) return toast('請輸入姓名與時數');
  personnel.push({ id:Date.now(), year:y, month:m, name:n, total: (r*h+b) });
  save(); toast('✓ 薪資已存'); refreshAll();
}
function renderPersonnel() {
    const y = Number(document.getElementById('per-year').value);
    const m = Number(document.getElementById('per-month').value);
    const rows = personnel.filter(p => p.year === y && p.month === m);
    document.getElementById('per-table-wrap').innerHTML = `<div class="tbl-wrap"><table><tr><th>姓名</th><th>薪資</th><th></th></tr>` +
    rows.map(r => `<tr><td>${r.name}</td><td style="font-weight:700">${money(r.total)}</td><td><button class="btn-danger" onclick="delPer(${r.id})">刪</button></td></tr>`).join('') + `</table></div>`;
}
function delPer(id) { if(confirm('刪除？')) { personnel=personnel.filter(x=>x.id!==id); save(); refreshAll(); } }

// --- 邏輯：損益 ---
function getMonthData(y, m) {
    const ym = `${y}-${pad(m)}`;
    const rev = revenue.filter(r => r.date.startsWith(ym)).reduce((s,r)=>s+r.total_amount, 0);
    const invA = inventory.filter(i => i.date.startsWith(ym) && i.cat==='A').reduce((s,i)=>s+i.total, 0);
    const invB = inventory.filter(i => i.date.startsWith(ym) && i.cat==='B').reduce((s,i)=>s+i.total, 0);
    const per = personnel.filter(p => p.year===Number(y) && p.month===Number(m)).reduce((s,p)=>s+p.total, 0);
    const exps = monthExp[ym] || [];
    const other = exps.reduce((s,e)=>s+e.amount, 0);
    return { rev, invA, invB, per, other, totalExp: invA+invB+per+other, profit: rev-(invA+invB+per+other) };
}

function renderPL() {
    const y = document.getElementById('pl-year').value;
    const m = document.getElementById('pl-month').value;
    const ym = `${y}-${pad(m)}`;
    const d = getMonthData(y, m);
    const exps = monthExp[ym] || [];

    document.getElementById('pl-content').innerHTML = `
        <div class="hero" style="background:${d.profit>=0?'var(--green)':'var(--red)'}">
            <div class="hero-label">${y}年${m}月 實質損益</div>
            <div class="hero-val">${money(d.profit)}</div>
        </div>
        <div class="card">
            <div class="sec-title">損益結構</div>
            <div class="exp-row"><span>總營業額</span><span style="color:var(--green);font-weight:700">${money(d.rev)}</span></div>
            <div class="exp-row"><span>A 食材貨款</span><span style="color:var(--red)">-${money(d.invA).slice(1)}</span></div>
            <div class="exp-row"><span>B 耗材/什支</span><span style="color:var(--red)">-${money(d.invB).slice(1)}</span></div>
            <div class="exp-row"><span>人事薪資</span><span style="color:var(--red)">-${money(d.per).slice(1)}</span></div>
            ${exps.map(e => `<div class="exp-row"><span>${e.name}</span><span style="color:var(--red)">-${money(e.amount).slice(1)} <button onclick="delMExp('${ym}',${e.id})" style="border:none;background:none;color:var(--muted)">✕</button></span></div>`).join('')}
        </div>
        <div class="card">
            <div class="sec-title">新增其它支出 (租金/水電等)</div>
            <div style="display:flex;gap:5px">
                <select id="pl-exp-name">${PRESET_EXP.map(x=>`<option>${x}</option>`).join('')}</select>
                <input type="number" id="pl-exp-amt" placeholder="金額">
                <button class="btn-primary" onclick="addMExp('${ym}')">＋</button>
            </div>
        </div>`;
}
function addMExp(ym) {
    const n = document.getElementById('pl-exp-name').value;
    const a = Number(document.getElementById('pl-exp-amt').value);
    if(!a) return; if(!monthExp[ym]) monthExp[ym]=[];
    monthExp[ym].push({id:Date.now(), name:n, amount:a}); save(); renderPL();
}
function delMExp(ym, id) { monthExp[ym]=monthExp[ym].filter(x=>x.id!==id); save(); renderPL(); }

// --- 邏輯：年度分析 ---
let yrMode = 'monthly';
function setYrView(v, btn) {
    yrMode = v;
    document.getElementById('yr-btn-m').classList.toggle('active', v==='monthly');
    document.getElementById('yr-btn-c').classList.toggle('active', v==='compare');
    renderYrContent();
}
function renderYrContent() {
    const y = document.getElementById('ov-year').value;
    const wrap = document.getElementById('yr-content');
    if(yrMode === 'monthly') {
        const data = Array(12).fill(0).map((_,i) => getMonthData(y, i+1));
        wrap.innerHTML = `<div class="month-grid">` +
            data.map((d,i) => `<div class="month-cell"><div>${i+1}月</div><div class="mc-val">${money(d.rev)}</div><div style="font-size:10px;color:${d.profit>=0?'var(--green)':'var(--red)'}">${money(d.profit)}</div></div>`).join('') + `</div>`;
    } else {
        const m = document.getElementById('ov-month').value;
        const cur = getMonthData(y, m);
        const last = getMonthData(y-1, m);
        wrap.innerHTML = `<div class="kpi-row">
            <div class="kpi"><div class="kpi-label">今年同月</div><div class="kpi-val">${money(cur.rev)}</div></div>
            <div class="kpi"><div class="kpi-label">去年同月</div><div class="kpi-val">${money(last.rev)}</div></div>
        </div>
        <div style="margin-top:15px; text-align:center">成長率: <b style="color:${cur.rev>=last.rev?'var(--green)':'var(--red)'}">${pct(cur.rev-last.rev, last.rev)}%</b></div>`;
    }
}

// --- 邏輯：食材管理 ---
function renderIngredients() {
    const y = document.getElementById('ing-year').value;
    const m = document.getElementById('ing-month').value;
    const ym = `${y}-${pad(m)}`;
    const d = getMonthData(y, m);
    const last = Number(document.getElementById('ing-last-stock').value) || 0;
    const cur = Number(document.getElementById('ing-cur-stock').value) || 0;
    const realConsum = d.invA + last - cur;

    document.getElementById('ing-result').innerHTML = `
        <div class="card" style="border-left:5px solid var(--accent)">
            <div class="sec-title">本月食材消耗計算 (A類)</div>
            <div class="exp-row"><span>本月食材進貨</span><span>+ ${money(d.invA)}</span></div>
            <div class="exp-row"><span>上月剩餘庫存</span><span>+ ${money(last)}</span></div>
            <div class="exp-row"><span>本月月底剩餘</span><span style="color:var(--red)">- ${money(cur)}</span></div>
            <div class="exp-row" style="border-top:2px solid var(--border); padding-top:10px; font-weight:900">
                <span>實際消耗成本</span><span style="font-size:20px;color:var(--accent2)">${money(realConsum)}</span>
            </div>
        </div>
        <div class="card">
            <div class="sec-title">食材成本佔比</div>
            <div class="bar-row">
                <div class="bar-meta"><span>消耗佔營收比</span><span class="bar-pct">${pct(realConsum, d.rev)}%</span></div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct(realConsum, d.rev)}%; background:var(--accent)"></div></div>
            </div>
            <p style="font-size:11px; color:var(--muted)">* 理想食材佔比通常建議在 25%~35% 之間。</p>
        </div>`;
}

// --- 總覽頁面 ---
function renderOverview() {
    const y = document.getElementById('ov-year').value;
    const m = document.getElementById('ov-month').value;
    const d = getMonthData(y, m);
    const tRev = revenue.find(x => x.date === todayStr);

    document.getElementById('header-today-rev').textContent = tRev ? money(tRev.total_amount) : '—';
    document.getElementById('ov-content').innerHTML = `
        <div class="hero">
            <div class="hero-label">${y}年${m}月 累積營收</div>
            <div class="hero-val">${money(d.rev)}</div>
            <div class="hero-row">
                <div class="hi"><p>預估盈餘</p><b>${money(d.profit)}</b></div>
                <div class="hi"><p>支出合計</p><b>${money(d.totalExp)}</b></div>
            </div>
        </div>
        <div class="card">
            <div class="sec-title">成本佔比</div>
            ${barRow('食材成本 (A)', pct(d.invA, d.rev), '#C49568')}
            ${barRow('人事薪資', pct(d.per, d.rev), '#8A7AAB')}
            ${barRow('其他支出', pct(d.invB + d.other, d.rev), '#7A9AAB')}
        </div>`;
}
function barRow(l, p, c) {
    return `<div class="bar-row"><div class="bar-meta"><span>${l}</span><span class="bar-pct">${p}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c}"></div></div></div>`;
}

function refreshAll() {
    renderOverview();
    renderRevTable();
    renderInvTable();
    renderPersonnel();
    renderPL();
    renderYrContent();
    renderIngredients();
}

// --- 啟動 ---
document.addEventListener('DOMContentLoaded', () => {
  initSelects();
  document.getElementById('rev-date').value = todayStr;
  document.getElementById('inv-date').value = todayStr;
  updateInvSuppliers();
  refreshAll();
});
</script>
</body>
</html>
