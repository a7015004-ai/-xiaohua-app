            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

    <style>
        :root { --bg: #F5EDE0; --accent: #D5BDAF; --text: #4E342E; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; }
        .nav-btn { flex: 1; padding: 12px 5px; text-align: center; font-size: 13px; color: #888; border-bottom: 2px solid transparent; }
        .active { color: var(--text); border-bottom: 2px solid var(--accent); font-weight: bold; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: var(--accent); color: white; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; }

<body class="max-w-md mx-auto pb-20">
    <header class="p-6 text-center">
        <h1 class="text-xl font-bold">小花食堂 · 完整管理系統</h1>
    </header>

    <nav class="sticky top-0 bg-white flex overflow-x-auto border-b z-50">
        <div id="btn-daily" onclick="switchTab('daily')" class="nav-btn active">每日營收</div>
        <div id="btn-stock" onclick="switchTab('stock')" class="nav-btn">進貨紀錄</div>
        <div id="btn-staff" onclick="switchTab('staff')" class="nav-btn">人事支出</div>
        <div id="btn-report" onclick="switchTab('report')" class="nav-btn">營運報表</div>
        <div id="btn-food" onclick="switchTab('food')" class="nav-btn">食材庫存</div>
    </nav>

    <main class="p-4">
        <div id="daily" class="tab-content">
            <div class="card">
                <h3 class="font-bold mb-2">新增營業額</h3>
                <input type="date" id="dateInput">
                <input type="number" id="revenueInput" placeholder="輸入今日總營業額">
                <button onclick="saveDaily()" class="btn-save mt-2">儲存數據</button>
            </div>
            <div id="dailyHistory"></div>
        </div>

        <div id="staff" class="tab-content hidden">
            <div class="card">
                <h3 class="font-bold mb-2">排班與薪資紀錄</h3>
                <select id="staffName"><option>小花</option><option>員工A</option></select>
                <input type="number" id="hours" placeholder="工時">
                <input type="number" id="hourlyRate" value="190">
                <button onclick="saveStaff()" class="btn-save mt-2">儲存薪資紀錄</button>
            </div>
        </div>

        <div id="report" class="tab-content hidden">
            <div class="card bg-amber-50">
                <h2 class="text-lg font-bold">本月損益分析表</h2>
                <div id="reportDetails" class="mt-2 space-y-1"></div>
            </div>
        </div>
        
        </main>

    <script>

</body>
